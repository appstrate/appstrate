# Appstrate — Self-Hosting Docker Compose
#
# Recommended:
#   curl -fsSL https://get.appstrate.dev | bash
#
# Manual:
#   cp .env.example .env   # edit secrets
#   docker compose up -d
#
# See README.md in this directory for full documentation.

name: appstrate

networks:
  appstrate-data:
    driver: bridge
    internal: true
  appstrate-public:
    driver: bridge

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks:
      - appstrate-data
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appstrate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appstrate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - appstrate-data
    command: redis-server --maxmemory-policy noeviction
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible storage) ───────────────────────────
  # Deliberately PRIVATE: no host ports are published at all. The S3 API
  # (:9000) is unreachable from outside the compose network — browser
  # uploads proxy through the platform on APP_URL (issue #829 — the
  # platform signs app-domain upload URLs and streams the bytes to MinIO
  # server-side), so MinIO needs no public FQDN and no exposed port. The
  # admin web console is disabled entirely (MINIO_BROWSER=off); inspect
  # buckets with `docker compose exec minio mc ...`. To presign
  # direct-to-bucket URLs instead (multi-node offload), expose the S3 API
  # publicly at a domain ROOT (SigV4 signs the full path — subpath
  # proxying is unsupported, minio/minio#7857) and set S3_PUBLIC_ENDPOINT
  # on the appstrate service.
  minio:
    # Pinned to a verified release (digest-locked) — matches the tier3
    # `docker-compose.yml`. `:latest` would let `docker compose pull`
    # silently swap the storage engine under running data.
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z@sha256:46b3009bf7041eefbd90bd0d2b38c6ddc24d20a35d609551a1802c558c1c958f
    networks:
      - appstrate-data
    command: server /data
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_BROWSER: "off"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initialization ─────────────────────────────
  minio-init:
    # Pinned to a verified release (digest-locked) — matches the tier3
    # `docker-compose.yml`.
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z@sha256:470f5546b596e16c7816b9c3fa7a78ce4076bb73c2c73f7faeec0c8043923123
    networks:
      - appstrate-data
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-appstrate}
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" 2>/dev/null; do sleep 1; done
        mc mb "local/$$S3_BUCKET" --ignore-existing
    depends_on:
      minio:
        condition: service_healthy

  # ── Database migrations ─────────────────────────────────────
  migrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-1.0.0-beta.36}
    networks:
      - appstrate-data
    restart: "no"
    command: ["bun", "packages/db/src/migrate.ts"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@postgres:5432/appstrate
    depends_on:
      postgres:
        condition: service_healthy

  # ── Pre-pull runtime images ─────────────────────────────────
  pi-pull:
    image: ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  sidecar-pull:
    image: ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  # ── Appstrate platform ─────────────────────────────────────
  appstrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-1.0.0-beta.36}
    networks:
      - appstrate-data
      - appstrate-public
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    # Docker socket access — DOCKER_GID is the GID owning /var/run/docker.sock on
    # the host. Set automatically by the installer (default 0 = root, fits macOS
    # Docker Desktop and root-owned sockets on Linux).
    group_add:
      - "${DOCKER_GID:-0}"
    # Reach the host loopback when the platform itself runs inside a container.
    # host-gateway is mapped by Docker (used as a fallback when the platform's
    # own Docker network can't be auto-detected).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # All optional env vars live in `.env.example` (the operator contract).
    # Defaults are defined ONCE in `packages/env/src/index.ts` (Zod schema)
    # and passthrough below means an unset host env falls back to that
    # single source of truth. Only deployment-specific values (infra
    # plumbing, required secrets, intentional overrides, defensive
    # workarounds) are declared here.
    environment:
      # ── Required secrets (loud-fail when missing) ────────────────
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - UPLOAD_SIGNING_SECRET=${UPLOAD_SIGNING_SECRET:?Set UPLOAD_SIGNING_SECRET in .env}
      - CONNECT_SESSION_SECRET=${CONNECT_SESSION_SECRET:?Set CONNECT_SESSION_SECRET in .env}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY:?Set CONNECTION_ENCRYPTION_KEY in .env}
      # ── Infra plumbing (refers to compose service hostnames) ─────
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@postgres:5432/appstrate
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      # Switches the platform into S3 mode (env-specific).
      - S3_BUCKET=${S3_BUCKET:-appstrate}
      - S3_REGION=${S3_REGION:-us-east-1}
      # ── Coupled to YAML semantics ────────────────────────────────
      # PORT mirrors the `ports:` mapping above; DOCKER_SOCKET mirrors
      # the `volumes:` mount; PI_IMAGE/SIDECAR_IMAGE couple to
      # APPSTRATE_VERSION and the GHCR registry (overrides the code
      # default which points at Docker Hub).
      - PORT=3000
      - DOCKER_SOCKET=/var/run/docker.sock
      - PI_IMAGE=ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - SIDECAR_IMAGE=ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-1.0.0-beta.36}
      # ── Intentional overrides (YAML default ≠ code default) ──────
      # RUN_ADAPTER: code default is `process` for OSS dev — a
      # containerized self-host must run agents in Docker.
      - RUN_ADAPTER=${RUN_ADAPTER:-docker}
      # TRUSTED_ORIGINS: code default allows dev localhost ports.
      # Prod self-host correctly defaults to empty — operator opts in
      # to their public domain explicitly.
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      # ── Sidecar capacity caps (operator-tunable passthrough) ─────
      # `pickOperatorSidecarEnv` (packages/runner-pi) forwards these
      # from the platform's `process.env` into spawned sidecar and
      # agent containers. Without these lines the operator cannot
      # override the sidecar-side defaults via .env.
      - SIDECAR_MAX_REQUEST_BODY_BYTES
      - SIDECAR_MAX_MCP_ENVELOPE_BYTES
      # ── Defensive workaround for better-auth 1.6+ namespace clash ──
      # NOTE: empty default (NOT `{}`) — better-auth 1.6+ has its own
      # `BETTER_AUTH_SECRETS` env var with CSV `v1:secret` format and crashes
      # boot on a non-CSV value. Empty string is falsy for better-auth and
      # treated as `{}` by `@appstrate/env`. Set this in `.env` only when
      # rotating the kid map; see env docstring in `packages/env/src/index.ts`.
      - BETTER_AUTH_SECRETS=${BETTER_AUTH_SECRETS:-}
      # ── Passthroughs ─────────────────────────────────────────────
      # Defaults live in `packages/env/src/index.ts`. Unset host env
      # falls back to the Zod schema's single source of truth.
      - APP_URL
      - LOG_LEVEL
      - MODULES
      - RUN_TOKEN_SECRET
      - SYSTEM_PROVIDER_KEYS
      - AUTH_DISABLE_SIGNUP
      - AUTH_DISABLE_ORG_CREATION
      - AUTH_PLATFORM_ADMIN_EMAILS
      - AUTH_ALLOWED_SIGNUP_DOMAINS
      - AUTH_BOOTSTRAP_OWNER_EMAIL
      - AUTH_BOOTSTRAP_ORG_NAME
      - BETTER_AUTH_ACTIVE_KID
      - CONNECTION_ENCRYPTION_KEY_ID
      - CONNECTION_ENCRYPTION_KEYS
      - AFPS_TRUST_ROOT
      - AFPS_SIGNATURE_POLICY
      - REMOTE_RUN_SINK_DEFAULT_TTL_SECONDS
      - REMOTE_RUN_SINK_MAX_TTL_SECONDS
      - RUN_HEARTBEAT_INTERVAL_SECONDS
      - RUN_STALL_THRESHOLD_SECONDS
      - RUN_WATCHDOG_INTERVAL_SECONDS
      # ── Observability (OpenTelemetry, optional) ──────────────────
      # Off by default; a complete no-op until enabled. Enabling needs
      # @appstrate/module-observability in MODULES plus an endpoint (the vars
      # are read from process.env by the module). Full guide:
      # docs/architecture/OBSERVABILITY.md
      - OTEL_ENABLED
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_SERVICE_NAME
      - OTEL_TRUST_INCOMING_TRACE
      # Read straight from process.env by the OTLP exporters (not in the
      # Zod schema, hence no default to duplicate):
      - OTEL_EXPORTER_OTLP_HEADERS
      - OTEL_EXPORTER_OTLP_PROTOCOL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Co-located Firecracker runner socket dir (UDS transport): mounted at
      # /run/appstrate-runner in the container so
      # FIRECRACKER_RUNNER_URL=unix:///run/appstrate-runner/runner.sock works.
      # The HOST side is env-driven: the firecracker installer sets
      # APPSTRATE_RUNNER_SOCKET_DIR=/run/appstrate-runner in .env; without it
      # the mount falls back to a harmless empty local dir (never touches
      # /run — Docker Desktop's default file sharing does not cover it).
      - ${APPSTRATE_RUNNER_SOCKET_DIR:-./data/appstrate-runner}:/run/appstrate-runner
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      pi-pull:
        condition: service_completed_successfully
      sidecar-pull:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  miniodata:
