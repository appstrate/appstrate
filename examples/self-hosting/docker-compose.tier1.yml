# Appstrate — Tier 1 (PostgreSQL only)
#
# Generated by `appstrate install --tier 1`. Smallest Docker-based tier
# — just PostgreSQL + the platform container. No Redis (the scheduler,
# rate-limiter, and pub/sub fall back to in-memory adapters — safe for
# single-instance deployments only, not for horizontal scaling). No
# MinIO (uploads go to the host filesystem under `./data/storage`).
#
# When to use: low-traffic self-host, single-node deploys, internal
# staging. For anything with >1 platform replica or sustained uploads,
# scale up to Tier 2 (adds Redis) or Tier 3 (adds MinIO/S3).
#
# Note: no top-level `name:` is set here. The CLI passes
# `--project-name <name>` based on `.appstrate/project.json` written at
# install time, so two installs under different directories get isolated
# projects (container namespaces) and can coexist on the same host. A
# hand-run of `docker compose up -d` on this file falls back to Compose's
# default (directory basename), which is still isolated per directory.

networks:
  appstrate-data:
    driver: bridge
    internal: true
  appstrate-public:
    driver: bridge

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    networks:
      - appstrate-data
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appstrate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appstrate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Database migrations ─────────────────────────────────────
  migrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-latest}
    networks:
      - appstrate-data
    restart: "no"
    command: ["bun", "packages/db/src/migrate.ts"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@postgres:5432/appstrate
    depends_on:
      postgres:
        condition: service_healthy

  # ── Pre-pull runtime images ─────────────────────────────────
  pi-pull:
    image: ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-latest}
    entrypoint: ["true"]
    restart: "no"

  sidecar-pull:
    image: ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-latest}
    entrypoint: ["true"]
    restart: "no"

  # ── Appstrate platform ─────────────────────────────────────
  appstrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-latest}
    networks:
      - appstrate-data
      - appstrate-public
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    group_add:
      - "${DOCKER_GID:-0}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@postgres:5432/appstrate
      - APP_URL=${APP_URL:-http://localhost:3000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - UPLOAD_SIGNING_SECRET=${UPLOAD_SIGNING_SECRET:?Set UPLOAD_SIGNING_SECRET in .env}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      - SYSTEM_PROVIDER_KEYS=${SYSTEM_PROVIDER_KEYS:-[]}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY:?Set CONNECTION_ENCRYPTION_KEY in .env}
      - RUN_TOKEN_SECRET=${RUN_TOKEN_SECRET:-}
      # No REDIS_URL → scheduler uses the in-memory BullMQ shim,
      # rate-limiter uses a local EventEmitter, pub/sub is a local Map.
      # OK for single-instance; not safe under horizontal scaling.
      - FS_STORAGE_PATH=/data/storage
      - RUN_ADAPTER=${RUN_ADAPTER:-docker}
      - DOCKER_SOCKET=/var/run/docker.sock
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PI_IMAGE=ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-latest}
      - SIDECAR_IMAGE=ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-latest}
      - MODULES=${MODULES:-oidc,webhooks}
      # ── Auth lockdown (closed-mode self-hosting; see AUTH_MODES.md) ──
      - AUTH_DISABLE_SIGNUP=${AUTH_DISABLE_SIGNUP:-false}
      - AUTH_DISABLE_ORG_CREATION=${AUTH_DISABLE_ORG_CREATION:-false}
      - AUTH_PLATFORM_ADMIN_EMAILS=${AUTH_PLATFORM_ADMIN_EMAILS:-}
      - AUTH_ALLOWED_SIGNUP_DOMAINS=${AUTH_ALLOWED_SIGNUP_DOMAINS:-}
      - AUTH_BOOTSTRAP_OWNER_EMAIL=${AUTH_BOOTSTRAP_OWNER_EMAIL:-}
      - AUTH_BOOTSTRAP_ORG_NAME=${AUTH_BOOTSTRAP_ORG_NAME:-Default}
      # ── Credential / auth secret rotation (optional) ──
      - BETTER_AUTH_ACTIVE_KID=${BETTER_AUTH_ACTIVE_KID:-k1}
      # NOTE: empty default (NOT `{}`) — better-auth 1.6+ has its own
      # `BETTER_AUTH_SECRETS` env var with CSV `v1:secret` format and crashes
      # boot on a non-CSV value. Empty string is falsy for better-auth and
      # treated as `{}` by `@appstrate/env`. Set this in `.env` only when
      # rotating the kid map; see env docstring in `packages/env/src/index.ts`.
      - BETTER_AUTH_SECRETS=${BETTER_AUTH_SECRETS:-}
      - CONNECTION_ENCRYPTION_KEY_ID=${CONNECTION_ENCRYPTION_KEY_ID:-k1}
      - CONNECTION_ENCRYPTION_KEYS=${CONNECTION_ENCRYPTION_KEYS:-{}}
      # ── AFPS bundle signing (optional) ──
      - AFPS_TRUST_ROOT=${AFPS_TRUST_ROOT:-[]}
      - AFPS_SIGNATURE_POLICY=${AFPS_SIGNATURE_POLICY:-off}
      # ── Sidecar capacity caps (optional, hard ceiling 100 MB) ──
      - SIDECAR_MAX_REQUEST_BODY_BYTES=${SIDECAR_MAX_REQUEST_BODY_BYTES:-10485760}
      - SIDECAR_MAX_MCP_ENVELOPE_BYTES=${SIDECAR_MAX_MCP_ENVELOPE_BYTES:-16777216}
      # ── Remote runner protocol + watchdog (optional) ──
      - REMOTE_RUN_SINK_DEFAULT_TTL_SECONDS=${REMOTE_RUN_SINK_DEFAULT_TTL_SECONDS:-7200}
      - REMOTE_RUN_SINK_MAX_TTL_SECONDS=${REMOTE_RUN_SINK_MAX_TTL_SECONDS:-86400}
      # Defaults live in `packages/env` — passthrough means an unset host
      # env falls back to the Zod schema's single source of truth.
      - RUN_HEARTBEAT_INTERVAL_SECONDS
      - RUN_STALL_THRESHOLD_SECONDS
      - RUN_WATCHDOG_INTERVAL_SECONDS
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - storagedata:/data/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      pi-pull:
        condition: service_completed_successfully
      sidecar-pull:
        condition: service_completed_successfully

volumes:
  pgdata:
  storagedata:
