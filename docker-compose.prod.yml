services:
  appstrate-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appstrate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appstrate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    mem_limit: 256m
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-pi:
    build:
      context: ./runtime-pi
    image: appstrate-pi:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "echo 'runtime image built'"]

  appstrate-sidecar:
    build:
      context: ./runtime-pi/sidecar
    image: appstrate-sidecar:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "echo 'sidecar image built'"]

  appstrate:
    build:
      context: .
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    restart: unless-stopped
    mem_limit: 512m
    networks:
      - default
    environment:
      - PORT=3000
      - LLM_MODEL=${LLM_MODEL:-claude-sonnet-4-5-20250929}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY}
      - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL}
      - EXECUTION_ADAPTER=${EXECUTION_ADAPTER:-pi}
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      appstrate-pi:
        condition: service_completed_successfully
      appstrate-sidecar:
        condition: service_completed_successfully

volumes:
  pgdata:
