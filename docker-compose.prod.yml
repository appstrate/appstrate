services:
  appstrate-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appstrate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appstrate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    mem_limit: 256m
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-pi:
    build:
      context: ./runtime-pi
    image: appstrate-pi:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "echo 'runtime image built'"]

  appstrate-sidecar:
    build:
      context: ./runtime-pi/sidecar
    image: appstrate-sidecar:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "echo 'sidecar image built'"]

  appstrate-migrate:
    build:
      context: .
    restart: "no"
    command: ["bun", "packages/db/src/migrate.ts"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
    depends_on:
      appstrate-postgres:
        condition: service_healthy

  appstrate:
    build:
      context: .
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
      - APP_URL=${APP_URL}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - LLM_MODEL_ID=${LLM_MODEL_ID:-claude-sonnet-4-5-20250929}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY}
      - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL}
      - SYSTEM_PROVIDERS=${SYSTEM_PROVIDERS:-[]}
      - DATA_DIR=${DATA_DIR:-./data}
      - STORAGE_DIR=${STORAGE_DIR:-./storage}
      - EXECUTION_ADAPTER=${EXECUTION_ADAPTER:-pi}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@appstrate.io}
      - EMAIL_FROM_NAME=${EMAIL_FROM_NAME:-Appstrate}
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appstrate-data:/app/data
      - appstrate-storage:/app/storage
    depends_on:
      appstrate-migrate:
        condition: service_completed_successfully
      appstrate-pi:
        condition: service_completed_successfully
      appstrate-sidecar:
        condition: service_completed_successfully

volumes:
  pgdata:
  appstrate-data:
  appstrate-storage:
