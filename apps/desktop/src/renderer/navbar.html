<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Navbar</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: #f5f5f7;
        color: #1d1d1f;
        -webkit-app-region: drag;
        user-select: none;
        overflow: hidden;
      }
      .bar {
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 8px;
        gap: 4px;
        border-bottom: 1px solid #e0e0e0;
      }
      .nav-button {
        background: none;
        border: none;
        cursor: pointer;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 16px;
        color: #1d1d1f;
        line-height: 1;
        -webkit-app-region: no-drag;
        min-width: 32px;
      }
      .nav-button:hover {
        background: #e8e8ed;
      }
      .nav-button:disabled {
        opacity: 0.3;
        cursor: default;
      }
      .nav-button:disabled:hover {
        background: none;
      }
      input.url {
        flex: 1;
        padding: 6px 12px;
        border: 1px solid #d2d2d7;
        border-radius: 6px;
        font-size: 13px;
        background: #ffffff;
        -webkit-app-region: no-drag;
        outline: none;
        margin: 0 4px;
      }
      input.url:focus {
        border-color: #007aff;
        box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
      }
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid #e0e0e0;
        border-top-color: #007aff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-left: 4px;
      }
      .spinner.hidden {
        visibility: hidden;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <button class="nav-button" id="back" title="Back">←</button>
      <button class="nav-button" id="forward" title="Forward">→</button>
      <button class="nav-button" id="reload" title="Reload">↻</button>
      <input
        class="url"
        id="url"
        type="text"
        placeholder="Enter URL or search…"
        spellcheck="false"
        autocomplete="off"
      />
      <span class="spinner hidden" id="spinner"></span>
    </div>
    <script>
      console.log("[navbar] script loaded, window.appstrate =", typeof window.appstrate);
      if (!window.appstrate) {
        console.error("[navbar] window.appstrate is undefined — preload did not run");
      }
      const $ = (id) => document.getElementById(id);
      const urlInput = $("url");
      const spinner = $("spinner");

      function go() {
        let value = urlInput.value.trim();
        if (!value) return;
        // Tolerant URL handling: bare hostnames get https://, anything else
        // looks like a search query → DuckDuckGo. Keeps the UX close to a
        // real browser address bar without bloating the POC.
        const isUrlLike =
          /^https?:\/\//i.test(value) || /^[a-z0-9-]+(\.[a-z0-9-]+)+(\/.*)?$/i.test(value);
        if (isUrlLike && !/^https?:\/\//i.test(value)) {
          value = "https://" + value;
        } else if (!isUrlLike) {
          value = "https://duckduckgo.com/?q=" + encodeURIComponent(value);
        }
        window.appstrate.navigate(value);
      }

      $("back").addEventListener("click", () => window.appstrate.back());
      $("forward").addEventListener("click", () => window.appstrate.forward());
      $("reload").addEventListener("click", () => window.appstrate.reload());
      urlInput.addEventListener("keydown", (e) => {
        console.log("[navbar] keydown", e.key);
        if (e.key === "Enter") go();
      });

      // Main process pushes URL updates whenever the underlying browser
      // navigates — whether triggered by the user typing here, the agent
      // calling browser.navigate, or in-page navigation.
      window.appstrate.onUrlChanged((url) => {
        if (document.activeElement !== urlInput) {
          urlInput.value = url === "about:blank" ? "" : url;
        }
      });

      window.appstrate.onLoadingChanged((loading) => {
        spinner.classList.toggle("hidden", !loading);
      });
    </script>
  </body>
</html>
