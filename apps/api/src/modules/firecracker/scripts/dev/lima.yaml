# SPDX-License-Identifier: Apache-2.0
#
# Lima VM for Firecracker development on macOS (Apple Silicon M3+, macOS 15+).
#
# Firecracker needs Linux + KVM. Apple's Virtualization.framework exposes
# nested virtualization on M3-and-later chips, so a Lima "vz" guest gets a
# real /dev/kvm — Firecracker runs inside it at near-native speed
# (verified: FC v1.16 boots a microVM in ~1.9 s under this setup).
#
# Managed by apps/api/src/modules/firecracker/scripts/dev/run-in-vm.sh (bun run test:firecracker).
# The host repo is mounted READ-ONLY (Lima default) and rsynced to the VM
# disk before each run — never `bun install` into the mounted host tree,
# it would overwrite macOS-native node_modules with Linux binaries.

vmType: vz
nestedVirtualization: true

cpus: 4
memory: "8GiB"
disk: "60GiB"

# Ubuntu LTS (Lima default template image set).
images:
  - location: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/releases/noble/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: "x86_64"

# Host home read-only (repo access for rsync) + writable /tmp/lima.
mounts:
  - location: "~"
  - location: "/tmp/lima"
    writable: true

provision:
  # System deps: docker (rootfs build), e2fsprogs (mkfs.ext4 -d), nftables +
  # iproute2 (host-net plumbing), firecracker binary, kvm access.
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive
      command -v docker >/dev/null || curl -fsSL https://get.docker.com | sh
      apt-get install -y --no-install-recommends e2fsprogs nftables iproute2 rsync unzip
      usermod -aG docker,kvm "{{.User}}"
      # udev rule so /dev/kvm stays group-accessible across reboots.
      echo 'KERNEL=="kvm", GROUP="kvm", MODE="0660"' > /etc/udev/rules.d/99-kvm.rules
      # Firecracker release binary — pinned version + published checksum,
      # never `latest` (supply chain). Keep FC_VERSION/FC_SHA256 in sync
      # with .github/workflows/firecracker.yml.
      if ! command -v firecracker >/dev/null || ! command -v jailer >/dev/null; then
        FC_VERSION="v1.16.0"
        ARCH="$(uname -m)"
        case "$ARCH" in
          x86_64)  FC_SHA256="bd04e26952d4e158085778c6230a0b383d2619c319182e27eaa9d61a212e92d6" ;;
          aarch64) FC_SHA256="531c713cdbc37d4b8bc2533d851aabc0267096afa1768086a37672abb668efd7" ;;
          *) echo "unsupported arch $ARCH" >&2; exit 1 ;;
        esac
        curl -fsSL -o /tmp/firecracker.tgz "https://github.com/firecracker-microvm/firecracker/releases/download/${FC_VERSION}/firecracker-${FC_VERSION}-${ARCH}.tgz"
        echo "${FC_SHA256}  /tmp/firecracker.tgz" | sha256sum -c -
        tar -xzf /tmp/firecracker.tgz -C /tmp
        install -m 0755 "/tmp/release-${FC_VERSION}-${ARCH}/firecracker-${FC_VERSION}-${ARCH}" /usr/local/bin/firecracker
        # The jailer ships in the same tarball — the smoke boots jailed
        # VMMs (FIRECRACKER_JAILER=on is the orchestrator default).
        install -m 0755 "/tmp/release-${FC_VERSION}-${ARCH}/jailer-${FC_VERSION}-${ARCH}" /usr/local/bin/jailer
        rm -rf "/tmp/release-${FC_VERSION}-${ARCH}" /tmp/firecracker.tgz
      fi
  # User deps: bun.
  - mode: user
    script: |
      #!/bin/bash
      set -eux
      command -v bun >/dev/null && exit 0
      curl -fsSL https://bun.sh/install | bash
      echo 'export PATH="$HOME/.bun/bin:$PATH"' >> ~/.bashrc

probes:
  - description: "firecracker installed"
    script: |
      #!/bin/bash
      until command -v firecracker >/dev/null 2>&1 && command -v jailer >/dev/null 2>&1; do sleep 3; done
