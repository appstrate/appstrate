# Appstrate — Development Services
#
# Starts infrastructure for local development with profile support:
#
#   bun run dev:minimal    → PostgreSQL only (filesystem storage, in-memory queue, process execution)
#   bun run dev:standard   → PostgreSQL + Redis (persistent scheduling, multi-instance support)
#   bun run dev            → PostgreSQL + Redis + MinIO (full stack, Docker execution)
#
# Manual usage:
#   docker compose -f docker-compose.dev.yml --profile minimal up -d
#   docker compose -f docker-compose.dev.yml --profile standard up -d
#   docker compose -f docker-compose.dev.yml --profile full up -d

name: appstrate-dev

services:
  # ─── PostgreSQL — all profiles ──────────────────────────────────
  postgres:
    image: postgres:16.8-alpine
    profiles: ["minimal", "standard", "full"]
    ports:
      - "${POSTGRES_PORT:-5423}:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: appstrate
      POSTGRES_PASSWORD: appstrate
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appstrate"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Redis — standard + full ────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    profiles: ["standard", "full"]
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── MinIO (S3) — full only ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    profiles: ["full"]
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    profiles: ["full"]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/appstrate &&
      echo 'Bucket appstrate ready'
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
