name: appstrate

services:
  appstrate-postgres:
    ports:
      - "5432:5432"
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 1g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=512MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appstrate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appstrate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-pi:
    build:
      context: ./runtime-pi
    image: appstrate-pi:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "echo 'runtime image built'"]

  appstrate-sidecar:
    build:
      context: ./runtime-pi/sidecar
    image: appstrate-sidecar:latest
    restart: "no"
    entrypoint: ["/bin/sh", "-c", "echo 'sidecar image built'"]

  appstrate-migrate:
    build:
      context: .
    restart: "no"
    command: ["bun", "packages/db/src/migrate.ts"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
    depends_on:
      appstrate-postgres:
        condition: service_healthy

volumes:
  pgdata:
