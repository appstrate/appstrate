# Appstrate — Development Infrastructure (Tier 1-3)
#
# Tier 0 (zero-install) needs NO Docker — just run `bun run dev` directly.
#
# Profiles map to infrastructure tiers:
#   minimal  = Tier 1: PostgreSQL only
#   standard = Tier 2: PostgreSQL + Redis
#   full     = Tier 3: PostgreSQL + Redis + MinIO (S3)
#
# Usage:
#   bun run docker:dev:minimal    # Tier 1
#   bun run docker:dev:standard   # Tier 2
#   bun run docker:dev            # Tier 3 (default)
#
# Then configure .env (uncomment DATABASE_URL, REDIS_URL, S3_BUCKET as needed)
# and run: bun run dev

name: appstrate-dev

services:
  # ─── PostgreSQL — Tier 1, 2, 3 ─────────────────────────────
  postgres:
    image: postgres:16.8-alpine
    profiles: ["minimal", "standard", "full"]
    ports:
      - "${POSTGRES_PORT:-5423}:5432"
    restart: unless-stopped
    environment:
      POSTGRES_USER: appstrate
      POSTGRES_PASSWORD: appstrate
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appstrate"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── Redis — Tier 2, 3 ─────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    profiles: ["standard", "full"]
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ─── MinIO (S3-compatible) — Tier 3 ────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    profiles: ["full"]
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    profiles: ["full"]
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/appstrate &&
      echo 'Bucket appstrate ready'
      "

volumes:
  pgdata:
  redisdata:
  miniodata:
