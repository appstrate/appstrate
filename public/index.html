<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenFlows</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-hover: #1a1a1a;
      --border: #262626;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
    }

    header h1 span { color: var(--primary); }

    .status-bar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-dot.connected { background: var(--success); }
    .status-dot.disconnected { background: var(--danger); }

    .badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
    }

    /* Flow Card */
    .flow-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .flow-card h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .flow-card .description {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .flow-card .tags {
      display: flex;
      gap: 0.375rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.7rem;
      padding: 0.125rem 0.5rem;
      border-radius: 999px;
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    /* Services */
    .services {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .service {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.8rem;
      padding: 0.375rem 0.625rem;
      border-radius: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      cursor: default;
    }

    .service.not-connected {
      border-color: var(--warning);
      cursor: pointer;
    }

    .service.not-connected:hover {
      background: rgba(245, 158, 11, 0.1);
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    button {
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover { background: var(--surface-hover); }

    button.primary {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    button.primary:hover { background: var(--primary-hover); }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Config Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 90%;
      max-width: 480px;
    }

    .modal h3 {
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      font-family: inherit;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      outline: none;
    }

    .form-group input:focus, .form-group select:focus {
      border-color: var(--primary);
    }

    .form-group .hint {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* Execution Output */
    .execution-output {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-top: 1rem;
      overflow: hidden;
      display: none;
    }

    .execution-output.active { display: block; }

    .execution-header {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
    }

    .execution-status {
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }

    .execution-log {
      padding: 1rem;
      max-height: 400px;
      overflow-y: auto;
      font-size: 0.8rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
      line-height: 1.8;
    }

    .log-entry {
      color: var(--text-muted);
      padding: 0.125rem 0;
    }

    .log-entry.progress::before {
      content: "→ ";
      color: var(--primary);
    }

    .log-entry.success { color: var(--success); }
    .log-entry.error { color: var(--danger); }

    /* Result */
    .result-section {
      padding: 1rem;
      border-top: 1px solid var(--border);
    }

    .result-section h4 {
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .result-summary {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .ticket-list {
      list-style: none;
    }

    .ticket-list li {
      padding: 0.375rem 0;
      font-size: 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .ticket-list li:last-child { border-bottom: none; }

    .ticket-list a {
      color: var(--primary);
      text-decoration: none;
    }

    .ticket-list a:hover { text-decoration: underline; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .pulsing { animation: pulse 1.5s ease-in-out infinite; }

    /* Loading spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>Open</span>Flows</h1>
      <div class="status-bar" id="statusBar"></div>
    </header>

    <div id="flowsList"></div>

    <!-- Config Modal -->
    <div class="modal-overlay" id="configModal">
      <div class="modal">
        <h3 id="configModalTitle">Configuration</h3>
        <div id="configForm"></div>
        <div class="modal-actions">
          <button onclick="closeConfigModal()">Annuler</button>
          <button class="primary" onclick="saveConfig()">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
