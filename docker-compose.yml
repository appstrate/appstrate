# Appstrate — Docker Compose
#
# Self-hosting:  docker compose up -d
# Upgrade:       docker compose pull && docker compose up -d
#
# For local development, copy docker-compose.override.example.yml
# to docker-compose.override.yml (auto-merged by Compose).
#
# Required .env variables:
#   POSTGRES_PASSWORD, BETTER_AUTH_SECRET, CONNECTION_ENCRYPTION_KEY,
#   MINIO_ROOT_PASSWORD
#
# Optional .env variables:
#   APP_URL, TRUSTED_ORIGINS, OAUTH_CALLBACK_URL, SYSTEM_PROVIDER_KEYS,
#   EXECUTION_ADAPTER, SIDECAR_POOL_SIZE, APPSTRATE_VERSION, LOG_LEVEL

name: appstrate

services:
  appstrate-postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    mem_limit: 1g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=512MB"
    environment:
      POSTGRES_USER: appstrate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appstrate"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-redis:
    image: redis:7-alpine
    command: redis-server --maxmemory-policy noeviction
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    mem_limit: 512m
    environment:
      MINIO_ROOT_USER: appstrate
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-minio-init:
    image: minio/mc:latest
    restart: "no"
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://appstrate-minio:9000 appstrate "$$MINIO_ROOT_PASSWORD" 2>/dev/null; do sleep 1; done
        mc mb local/appstrate --ignore-existing
    depends_on:
      appstrate-minio:
        condition: service_healthy

  appstrate-migrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-latest}
    restart: "no"
    command: ["bun", "packages/db/src/migrate.ts"]
    environment:
      - DATABASE_URL=postgresql://appstrate:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
    depends_on:
      appstrate-postgres:
        condition: service_healthy

  # Pull-only services: ensure runtime images are present before appstrate starts.
  # These exit immediately — they only trigger `docker compose pull`.
  appstrate-pi:
    image: ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-latest}
    entrypoint: ["true"]
    restart: "no"

  appstrate-sidecar:
    image: ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-latest}
    entrypoint: ["true"]
    restart: "no"

  appstrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-latest}
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    mem_limit: 8g
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://appstrate:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
      - APP_URL=${APP_URL:-http://localhost:3000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      - SYSTEM_PROVIDER_KEYS=${SYSTEM_PROVIDER_KEYS:-[]}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY:?Set CONNECTION_ENCRYPTION_KEY in .env}
      - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL:-}
      - REDIS_URL=redis://appstrate-redis:6379
      - S3_BUCKET=appstrate
      - S3_REGION=us-east-1
      - S3_ENDPOINT=http://appstrate-minio:9000
      - AWS_ACCESS_KEY_ID=appstrate
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      - EXECUTION_ADAPTER=${EXECUTION_ADAPTER:-pi}
      - DOCKER_SOCKET=/var/run/docker.sock
      - SIDECAR_POOL_SIZE=${SIDECAR_POOL_SIZE:-2}
      - PI_IMAGE=ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-latest}
      - SIDECAR_IMAGE=ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      appstrate-migrate:
        condition: service_completed_successfully
      appstrate-redis:
        condition: service_healthy
      appstrate-minio-init:
        condition: service_completed_successfully
      appstrate-pi:
        condition: service_completed_successfully
      appstrate-sidecar:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  miniodata:
