# Appstrate — Docker Compose (Self-Hosting / Production)
#
# Self-hosting:  docker compose up -d
# Upgrade:       docker compose pull && docker compose up -d
# Cleanup:       docker compose down -v   (removes containers AND data)
#
# For local development, use docker-compose.dev.yml instead:
#   bun run setup              (recommended — runs everything automatically)
#   docker compose -f docker-compose.dev.yml up -d   (manual)
#
# Required .env variables:
#   POSTGRES_PASSWORD, BETTER_AUTH_SECRET, CONNECTION_ENCRYPTION_KEY,
#   UPLOAD_SIGNING_SECRET, RUN_TOKEN_SECRET, CONNECT_SESSION_SECRET,
#   MINIO_ROOT_PASSWORD
#
# Optional .env variables:
#   POSTGRES_USER, MINIO_ROOT_USER, S3_BUCKET (default: appstrate),
#   S3_REGION (default: us-east-1), APP_URL, TRUSTED_ORIGINS,
#   SYSTEM_PROVIDER_KEYS, RUN_ADAPTER,
#   APPSTRATE_VERSION, LOG_LEVEL

name: appstrate

networks:
  appstrate-data:
    driver: bridge
    internal: true
  appstrate-public:
    driver: bridge

services:
  appstrate-postgres:
    image: postgres:16.8-alpine
    networks:
      - appstrate-data
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"  # Uncomment to expose PostgreSQL to the host
    restart: unless-stopped
    mem_limit: 1g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=512MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER in .env}"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-redis:
    image: redis:7.4-alpine
    networks:
      - appstrate-data
    command: redis-server --maxmemory-policy noeviction
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"  # Uncomment to expose Redis to the host
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Deliberately PRIVATE: no host ports are published. In proxy-upload
  # mode (S3_PUBLIC_ENDPOINT unset — the default below) the platform
  # streams upload bytes to MinIO server-side over the internal
  # `appstrate-data` network, so the S3 API (:9000) needs no host
  # exposure. The admin web console is disabled entirely
  # (MINIO_BROWSER=off); inspect buckets via
  # `docker compose exec appstrate-minio mc ...`. Only publish :9000
  # (add a `ports:` mapping) if you opt into direct-to-bucket presign by
  # setting S3_PUBLIC_ENDPOINT to a public MinIO domain.
  appstrate-minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    networks:
      - appstrate-data
    command: server /data
    restart: unless-stopped
    mem_limit: 512m
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_BROWSER: "off"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    networks:
      - appstrate-data
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-appstrate}
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://appstrate-minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" 2>/dev/null; do sleep 1; done
        mc mb "local/$$S3_BUCKET" --ignore-existing
    depends_on:
      appstrate-minio:
        condition: service_healthy

  # Pre-pull runtime images so they're available when the first flow executes.
  # Without this, the first execution would block on a slow image pull.
  # These containers exit immediately after pulling.
  appstrate-pi:
    image: ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  appstrate-sidecar:
    image: ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  # Per-integration MCP runner images. The sidecar `docker create`s one of
  # these per local AFPS integration (resolved from RUNNER_IMAGE_* below).
  # Pre-pulled so the first integration boot doesn't block on — or fail at —
  # an on-demand pull.
  appstrate-mcp-runner-node:
    image: ghcr.io/appstrate/appstrate-mcp-runner-node:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  appstrate-mcp-runner-python:
    image: ghcr.io/appstrate/appstrate-mcp-runner-python:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  appstrate-mcp-runner-bun:
    image: ghcr.io/appstrate/appstrate-mcp-runner-bun:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  appstrate-mcp-runner-uv:
    image: ghcr.io/appstrate/appstrate-mcp-runner-uv:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  appstrate-mcp-runner-binary:
    image: ghcr.io/appstrate/appstrate-mcp-runner-binary:${APPSTRATE_VERSION:-1.0.0-beta.36}
    entrypoint: ["true"]
    restart: "no"

  # ── Docker socket proxy (PARTIAL hardening — commented by default) ─────────
  #
  # Fronts the Docker socket with a filtering reverse proxy so the platform
  # container never touches `/var/run/docker.sock` directly. Only THIS service
  # mounts the socket (still `:ro`, but it is the only process that can reach
  # the daemon), and it rejects (403) every API verb group not explicitly
  # enabled below.
  #
  # IMPORTANT — this does NOT contain a platform compromise to "just the
  # whitelisted verbs". The proxy filters by API GROUP/VERB only; it does NOT
  # inspect request bodies. With CONTAINERS=1 + POST=1 (which the platform
  # needs to create run containers), a compromised platform can still
  # `POST /containers/create` with `HostConfig.Privileged: true` plus a host
  # bind mount (e.g. `/:/host`) and start it — regaining full root on the host.
  # What the proxy DOES buy you is blocking the host-level / cluster / exec
  # surface (INFO/AUTH/SECRETS/SWARM/SERVICES/EXEC/… stay default-deny), which
  # narrows the reachable API — but container-create is itself a host-root
  # primitive, so treat this as defense-in-depth, not a security boundary.
  # A real boundary needs an authorization plugin that filters create payloads,
  # or a rootless/VM-isolated daemon (see RUN_ADAPTER=firecracker).
  #
  # Pinned by digest (tecnativa/docker-socket-proxy:0.3.0). Verbs enabled match
  # what the platform actually uses: create/start/stop/inspect/logs containers,
  # pull images, and manage the per-run isolated networks/volumes it provisions
  # (see the run architecture in CLAUDE.md). Tighten further if your deployment
  # doesn't need a given group.
  #
  # To enable:
  #   1. Uncomment this service.
  #   2. On the `appstrate` service: remove the `/var/run/docker.sock` volume
  #      mount and the `DOCKER_SOCKET=/var/run/docker.sock` env line, then add
  #      `- DOCKER_HOST=tcp://appstrate-docker-proxy:2375` and a
  #      `appstrate-docker-proxy: { condition: service_started }` entry under
  #      `depends_on`.
  #
  # RESIDUAL: the proxy speaks the Docker API over TCP (:2375, on the internal
  # `appstrate-data` network — never publish it). The platform's Docker client
  # in this image talks to a UNIX socket path (`DOCKER_SOCKET`); a `tcp://`
  # `DOCKER_HOST` is only honoured by a platform build whose client supports it.
  # Verify your image supports TCP `DOCKER_HOST` before switching, otherwise
  # runs will fail to reach the daemon. Until then the direct mount is the
  # working default.
  #
  # appstrate-docker-proxy:
  #   image: tecnativa/docker-socket-proxy:0.3.0@sha256:9e4b9e7517a6b660f2cc903a19b257b1852d5b3344794e3ea334ff00ae677ac2
  #   networks:
  #     - appstrate-data
  #   restart: unless-stopped
  #   mem_limit: 64m
  #   environment:
  #     # Whitelisted API groups (1 = allow GET). POST=1 is what actually
  #     # permits create/start/stop/pull; without it the proxy is read-only.
  #     - CONTAINERS=1
  #     - IMAGES=1
  #     - NETWORKS=1
  #     - VOLUMES=1
  #     - POST=1
  #     # Everything else stays at the proxy's default-deny (INFO/AUTH/SECRETS/
  #     # SWARM/SERVICES/… = 0), so host-level and cluster verbs are refused.
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro

  appstrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-1.0.0-beta.36}
    networks:
      - appstrate-data
      - appstrate-public
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    mem_limit: 8g
    environment:
      # ── Core ──
      - PORT=3000
      - APP_URL=${APP_URL:-http://localhost:3000}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MODULES
      # ── Auth / Crypto ──
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY:?Set CONNECTION_ENCRYPTION_KEY in .env}
      - RUN_TOKEN_SECRET=${RUN_TOKEN_SECRET:?Set RUN_TOKEN_SECRET in .env}
      - UPLOAD_SIGNING_SECRET=${UPLOAD_SIGNING_SECRET:?Set UPLOAD_SIGNING_SECRET in .env}
      - CONNECT_SESSION_SECRET=${CONNECT_SESSION_SECRET:?Set CONNECT_SESSION_SECRET in .env}
      # ── Database / Redis ──
      - DATABASE_URL=postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
      - REDIS_URL=redis://appstrate-redis:6379
      # ── S3 Storage ──
      - S3_BUCKET=${S3_BUCKET:-appstrate}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://appstrate-minio:9000}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      # ── Run / Sidecar ──
      - RUN_ADAPTER=${RUN_ADAPTER:-docker}
      - DOCKER_SOCKET=/var/run/docker.sock
      # PLATFORM_API_URL intentionally omitted: left unset, the platform
      # auto-detects its Docker network and builds the sidecar-facing URL
      # from the effective container hostname. Forwarding `${PLATFORM_API_URL:-}`
      # injects an empty string, which bypasses the auto-detection path.
      # Set it only if you need to point sidecars at a different host.
      - PI_IMAGE=ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - SIDECAR_IMAGE=ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - BROWSER_ENABLED=${BROWSER_ENABLED:-false}
      - BROWSER_CONNECT_ENABLED=${BROWSER_CONNECT_ENABLED:-false}
      - BROWSER_DRIVER_GRANTS=${BROWSER_DRIVER_GRANTS:-[]}
      - BROWSER_WORKER_IMAGE=ghcr.io/appstrate/appstrate-browser-worker:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - BROWSER_MAX_CONCURRENT=${BROWSER_MAX_CONCURRENT:-4}
      # Runner images forwarded to the sidecar (SIDECAR_OPERATOR_ENV_KEYS) so
      # it spawns integration runners from GHCR instead of bare `:latest` tags
      # (which the daemon would try — and fail — to pull from Docker Hub).
      - RUNNER_IMAGE_NODE=ghcr.io/appstrate/appstrate-mcp-runner-node:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - RUNNER_IMAGE_PYTHON=ghcr.io/appstrate/appstrate-mcp-runner-python:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - RUNNER_IMAGE_BUN=ghcr.io/appstrate/appstrate-mcp-runner-bun:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - RUNNER_IMAGE_UV=ghcr.io/appstrate/appstrate-mcp-runner-uv:${APPSTRATE_VERSION:-1.0.0-beta.36}
      - RUNNER_IMAGE_BINARY=ghcr.io/appstrate/appstrate-mcp-runner-binary:${APPSTRATE_VERSION:-1.0.0-beta.36}
      # ── System config (JSON arrays) ──
      - SYSTEM_PROVIDER_KEYS=${SYSTEM_PROVIDER_KEYS:-[]}
      - SYSTEM_PROXIES=${SYSTEM_PROXIES:-[]}
      - PROXY_URL=${PROXY_URL:-}
      - OIDC_INSTANCE_CLIENTS=${OIDC_INSTANCE_CLIENTS:-[]}
      # ── Social login (optional) ──
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      # ── SMTP (optional) ──
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # ── Legal (optional) ──
      - LEGAL_TERMS_URL=${LEGAL_TERMS_URL:-}
      - LEGAL_PRIVACY_URL=${LEGAL_PRIVACY_URL:-}
      # ── Auth lockdown (optional, see examples/self-hosting/AUTH_MODES.md) ──
      - AUTH_DISABLE_SIGNUP=${AUTH_DISABLE_SIGNUP:-false}
      - AUTH_DISABLE_ORG_CREATION=${AUTH_DISABLE_ORG_CREATION:-false}
      - AUTH_PLATFORM_ADMIN_EMAILS=${AUTH_PLATFORM_ADMIN_EMAILS:-}
      - AUTH_ALLOWED_SIGNUP_DOMAINS=${AUTH_ALLOWED_SIGNUP_DOMAINS:-}
      - AUTH_BOOTSTRAP_OWNER_EMAIL=${AUTH_BOOTSTRAP_OWNER_EMAIL:-}
      - AUTH_BOOTSTRAP_ORG_NAME=${AUTH_BOOTSTRAP_ORG_NAME:-Default}
      # ── Auth secret rotation (optional) ──
      - BETTER_AUTH_ACTIVE_KID=${BETTER_AUTH_ACTIVE_KID:-k1}
      # NOTE: empty default (NOT `{}`) — better-auth 1.6+ has its own
      # `BETTER_AUTH_SECRETS` env var with CSV `v1:secret` format and crashes
      # boot on a non-CSV value. Empty string is falsy for better-auth and
      # treated as `{}` by `@appstrate/env`. Set this in `.env` only when
      # rotating the kid map; see env docstring in `packages/env/src/index.ts`.
      - BETTER_AUTH_SECRETS=${BETTER_AUTH_SECRETS:-}
      # ── Credential encryption rotation (optional) ──
      - CONNECTION_ENCRYPTION_KEY_ID=${CONNECTION_ENCRYPTION_KEY_ID:-k1}
      - CONNECTION_ENCRYPTION_KEYS=${CONNECTION_ENCRYPTION_KEYS:-{}}
      # ── AFPS bundle signing (optional) ──
      - AFPS_TRUST_ROOT=${AFPS_TRUST_ROOT:-[]}
      - AFPS_SIGNATURE_POLICY=${AFPS_SIGNATURE_POLICY:-off}
      # ── Sidecar capacity caps (optional, hard ceiling 100 MB) ──
      - SIDECAR_MAX_REQUEST_BODY_BYTES=${SIDECAR_MAX_REQUEST_BODY_BYTES:-10485760}
      - SIDECAR_MAX_MCP_ENVELOPE_BYTES=${SIDECAR_MAX_MCP_ENVELOPE_BYTES:-16777216}
      # ── Remote runner protocol (optional) ──
      - REMOTE_RUN_SINK_DEFAULT_TTL_SECONDS=${REMOTE_RUN_SINK_DEFAULT_TTL_SECONDS:-7200}
      - REMOTE_RUN_SINK_MAX_TTL_SECONDS=${REMOTE_RUN_SINK_MAX_TTL_SECONDS:-86400}
      - REMOTE_RUN_REPLAY_WINDOW_SECONDS=${REMOTE_RUN_REPLAY_WINDOW_SECONDS:-600}
      - REMOTE_RUN_BUFFER_FLUSH_MS=${REMOTE_RUN_BUFFER_FLUSH_MS:-5000}
      - REMOTE_RUN_EVENT_LIMITS=${REMOTE_RUN_EVENT_LIMITS:-{}}
      # ── Run liveness watchdog (optional, ratio: stall ≥ 3 × heartbeat) ──
      # Defaults live in `packages/env` — passthrough means an unset host
      # env falls back to the Zod schema's single source of truth.
      - RUN_HEARTBEAT_INTERVAL_SECONDS
      - RUN_STALL_THRESHOLD_SECONDS
      - RUN_WATCHDOG_INTERVAL_SECONDS
      # ── Run limits (optional, see docs/specs/INLINE_RUNS.md) ──
      - PLATFORM_RUN_LIMITS=${PLATFORM_RUN_LIMITS:-{}}
      - INLINE_RUN_LIMITS=${INLINE_RUN_LIMITS:-{}}
      # ── Misc ──
      - API_BODY_LIMIT_BYTES=${API_BODY_LIMIT_BYTES:-10485760}
      - S3_PUBLIC_ENDPOINT=${S3_PUBLIC_ENDPOINT:-}
      # ── Observability (OpenTelemetry, optional) ──
      # Off by default; a complete no-op until enabled. Enabling needs
      # @appstrate/module-observability in MODULES plus an endpoint; the vars
      # are read from process.env by the module (not in the Zod schema).
      # Full guide: docs/architecture/OBSERVABILITY.md
      - OTEL_ENABLED
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - OTEL_SERVICE_NAME
      - OTEL_TRUST_INCOMING_TRACE
      # Read straight from process.env by the OTLP exporters (not in the Zod
      # schema):
      - OTEL_EXPORTER_OTLP_HEADERS
      - OTEL_EXPORTER_OTLP_PROTOCOL
    volumes:
      # SECURITY: the `:ro` suffix makes only the SOCKET FILE read-only — it
      # does NOT make the Docker API read-only. A process with this mount can
      # still POST to the API (create/start privileged containers, bind-mount
      # `/` from the host, etc.), so a compromised platform container is
      # effectively root on the Docker host. There is no compose-only way to
      # restrict the API surface — the only real mitigation is to front the
      # socket with a filtering proxy that whitelists the verbs the platform
      # needs. See the commented `appstrate-docker-proxy` service below and the
      # switch instructions there. This direct mount remains the default only
      # because the switch requires a platform build whose Docker client can
      # target a TCP `DOCKER_HOST` (see residual note on the proxy service).
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      appstrate-postgres:
        condition: service_healthy
      appstrate-redis:
        condition: service_healthy
      appstrate-minio-init:
        condition: service_completed_successfully
      appstrate-pi:
        condition: service_completed_successfully
      appstrate-sidecar:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  miniodata:
