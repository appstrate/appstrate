# Appstrate — Docker Compose
#
# Self-hosting:  docker compose up -d
# Upgrade:       docker compose pull && docker compose up -d
#
# For local development, copy docker-compose.override.example.yml
# to docker-compose.override.yml (auto-merged by Compose).

name: appstrate

services:
  appstrate-postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    mem_limit: 1g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=512MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appstrate}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appstrate}"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-migrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-latest}
    restart: "no"
    command: ["bun", "packages/db/src/migrate.ts"]
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
    depends_on:
      appstrate-postgres:
        condition: service_healthy

  appstrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-latest}
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    mem_limit: 8g
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-appstrate}:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
      - APP_URL=${APP_URL:-http://localhost:3000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      - SYSTEM_MODELS=${SYSTEM_MODELS:-[]}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY:?Set CONNECTION_ENCRYPTION_KEY in .env}
      - OAUTH_CALLBACK_URL=${OAUTH_CALLBACK_URL:-}
      - STORAGE_DIR=${STORAGE_DIR:-./storage}
      - EXECUTION_ADAPTER=${EXECUTION_ADAPTER:-pi}
      - DOCKER_SOCKET=/var/run/docker.sock
      - SIDECAR_POOL_SIZE=${SIDECAR_POOL_SIZE:-2}
      - PI_IMAGE=ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-latest}
      - SIDECAR_IMAGE=ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - appstrate-storage:/app/storage
    depends_on:
      appstrate-migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
  appstrate-storage:
