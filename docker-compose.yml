# Appstrate — Docker Compose (Self-Hosting / Production)
#
# Self-hosting:  docker compose up -d
# Upgrade:       docker compose pull && docker compose up -d
# Cleanup:       docker compose down -v   (removes containers AND data)
#
# For local development, use docker-compose.dev.yml instead:
#   bun run setup              (recommended — runs everything automatically)
#   docker compose -f docker-compose.dev.yml up -d   (manual)
#
# Required .env variables:
#   POSTGRES_PASSWORD, BETTER_AUTH_SECRET, CONNECTION_ENCRYPTION_KEY,
#   MINIO_ROOT_PASSWORD
#
# Optional .env variables:
#   POSTGRES_USER, MINIO_ROOT_USER, S3_BUCKET (default: appstrate),
#   S3_REGION (default: us-east-1), APP_URL, TRUSTED_ORIGINS,
#   SYSTEM_PROVIDER_KEYS, RUN_ADAPTER,
#   SIDECAR_POOL_SIZE, APPSTRATE_VERSION, LOG_LEVEL

name: appstrate

networks:
  appstrate-data:
    driver: bridge
    internal: true
  appstrate-public:
    driver: bridge

services:
  appstrate-postgres:
    image: postgres:16.8-alpine
    networks:
      - appstrate-data
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"  # Uncomment to expose PostgreSQL to the host
    restart: unless-stopped
    mem_limit: 1g
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "wal_level=minimal"
      - "-c"
      - "max_wal_senders=0"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_cache_size=512MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Set POSTGRES_USER in .env}"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-redis:
    image: redis:7.4-alpine
    networks:
      - appstrate-data
    command: redis-server --maxmemory-policy noeviction
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"  # Uncomment to expose Redis to the host
    restart: unless-stopped
    mem_limit: 256m
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-minio:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    networks:
      - appstrate-data
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    mem_limit: 512m
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  appstrate-minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    networks:
      - appstrate-data
    restart: "no"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-appstrate}
    entrypoint:
      - sh
      - -c
      - |
        until mc alias set local http://appstrate-minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" 2>/dev/null; do sleep 1; done
        mc mb "local/$$S3_BUCKET" --ignore-existing
    depends_on:
      appstrate-minio:
        condition: service_healthy

  # Pre-pull runtime images so they're available when the first flow executes.
  # Without this, the first execution would block on a slow image pull.
  # These containers exit immediately after pulling.
  appstrate-pi:
    image: ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-latest}
    entrypoint: ["true"]
    restart: "no"

  appstrate-sidecar:
    image: ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-latest}
    entrypoint: ["true"]
    restart: "no"

  appstrate:
    image: ghcr.io/appstrate/appstrate:${APPSTRATE_VERSION:-latest}
    networks:
      - appstrate-data
      - appstrate-public
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped
    mem_limit: 8g
    environment:
      # ── Core ──
      - PORT=3000
      - APP_URL=${APP_URL:-http://localhost:3000}
      - TRUSTED_ORIGINS=${TRUSTED_ORIGINS:-}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-}
      - TRUST_PROXY=${TRUST_PROXY:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MODULES=${MODULES:-oidc,webhooks}
      # ── Auth / Crypto ──
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      - CONNECTION_ENCRYPTION_KEY=${CONNECTION_ENCRYPTION_KEY:?Set CONNECTION_ENCRYPTION_KEY in .env}
      - RUN_TOKEN_SECRET=${RUN_TOKEN_SECRET:-}
      - UPLOAD_SIGNING_SECRET=${UPLOAD_SIGNING_SECRET:?Set UPLOAD_SIGNING_SECRET in .env}
      # ── Database / Redis ──
      - DATABASE_URL=postgresql://${POSTGRES_USER:?Set POSTGRES_USER in .env}:${POSTGRES_PASSWORD}@appstrate-postgres:5432/appstrate
      - REDIS_URL=redis://appstrate-redis:6379
      # ── S3 Storage ──
      - S3_BUCKET=${S3_BUCKET:-appstrate}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://appstrate-minio:9000}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD}
      # ── Run / Sidecar ──
      - RUN_ADAPTER=${RUN_ADAPTER:-docker}
      - DOCKER_SOCKET=/var/run/docker.sock
      # PLATFORM_API_URL intentionally omitted: left unset, the platform
      # auto-detects its Docker network and builds the sidecar-facing URL
      # from the effective container hostname. Forwarding `${PLATFORM_API_URL:-}`
      # injects an empty string, which bypasses the auto-detection path.
      # Set it only if you need to point sidecars at a different host.
      - SIDECAR_POOL_SIZE=${SIDECAR_POOL_SIZE:-2}
      - PI_IMAGE=ghcr.io/appstrate/appstrate-pi:${APPSTRATE_VERSION:-latest}
      - SIDECAR_IMAGE=ghcr.io/appstrate/appstrate-sidecar:${APPSTRATE_VERSION:-latest}
      # ── System config (JSON arrays) ──
      - SYSTEM_PROVIDER_KEYS=${SYSTEM_PROVIDER_KEYS:-[]}
      - SYSTEM_PROXIES=${SYSTEM_PROXIES:-[]}
      - PROXY_URL=${PROXY_URL:-}
      - OIDC_INSTANCE_CLIENTS=${OIDC_INSTANCE_CLIENTS:-[]}
      # ── Social login (optional) ──
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      # ── SMTP (optional) ──
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      # ── Legal (optional) ──
      - LEGAL_TERMS_URL=${LEGAL_TERMS_URL:-}
      - LEGAL_PRIVACY_URL=${LEGAL_PRIVACY_URL:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      appstrate-postgres:
        condition: service_healthy
      appstrate-redis:
        condition: service_healthy
      appstrate-minio-init:
        condition: service_completed_successfully
      appstrate-pi:
        condition: service_completed_successfully
      appstrate-sidecar:
        condition: service_completed_successfully

volumes:
  pgdata:
  redisdata:
  miniodata:
