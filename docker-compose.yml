services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appstrate
      POSTGRES_PASSWORD: appstrate
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init script to create the nango database alongside appstrate
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-nango-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appstrate"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.2-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nango:
    image: nangohq/nango-server:hosted
    platform: linux/amd64
    ports:
      - "3003:3003"
      - "3009:3009"
    environment:
      - NANGO_DB_HOST=postgres
      - NANGO_DB_PORT=5432
      - NANGO_DB_USER=appstrate
      - NANGO_DB_PASSWORD=appstrate
      - NANGO_DB_NAME=nango
      - NANGO_DB_SSL=false
      - NANGO_REDIS_URL=redis://redis:6379
      - NANGO_ENCRYPTION_KEY=${NANGO_ENCRYPTION_KEY}
      - NANGO_SECRET_KEY_DEV=${NANGO_SECRET_KEY}
      - NANGO_SERVER_URL=http://localhost:3003
      - NANGO_PUBLIC_SERVER_URL=http://localhost:3003
      - SERVER_PORT=3003
      - FLAG_AUTH_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
