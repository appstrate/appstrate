services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appstrate
      POSTGRES_PASSWORD: appstrate
      POSTGRES_DB: appstrate
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appstrate"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
