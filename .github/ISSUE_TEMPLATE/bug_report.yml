name: Bug Report
description: Report a bug in Appstrate
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      render: typescript
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      placeholder: "1.2.x"
    validations:
      required: true
  - type: input
    id: docker-version
    attributes:
      label: Docker version
      placeholder: "27.x"
    validations:
      required: true
