name: Publish @appstrate/core to npm

on:
  push:
    tags:
      - "core@*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

# Serialize ALL core publishes — see publish-cli.yml for rationale
# (npm `latest` dist-tag race on rapid-fire tag pushes).
concurrency:
  group: publish-core
  cancel-in-progress: false

jobs:
  publish:
    name: Quality, Tests & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/core

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: TypeScript type-check
        run: tsc --noEmit

      - name: Tests
        run: bun test

      - name: Check schemas are up-to-date
        run: |
          bun run generate:schemas
          git diff --exit-code schema/ || (echo "::error::Schemas are stale — run 'bun run generate:schemas' and commit" && exit 1)

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#core@}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Check consumer-repo lockstep
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ secrets.CONSUMER_LOCKSTEP_TOKEN || secrets.GITHUB_TOKEN }}
          # `fail` blocks publish if any consumer is >= 2 minors behind.
          # Set to `warn` for an emergency hotfix that intentionally outpaces
          # consumers, or `off` to bypass entirely.
          CONSUMER_DRIFT_POLICY: ${{ vars.CONSUMER_DRIFT_POLICY || 'fail' }}
        run: bun scripts/check-consumer-versions.ts

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
