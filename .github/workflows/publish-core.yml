name: Publish @appstrate/core to npm

on:
  push:
    tags:
      - "core@*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

# Serialize ALL core publishes — see publish-cli.yml for rationale
# (npm `latest` dist-tag race on rapid-fire tag pushes).
concurrency:
  group: publish-core
  cancel-in-progress: false

jobs:
  publish:
    name: Quality, Tests & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/core

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: TypeScript type-check
        run: tsc --noEmit

      - name: Tests
        run: bun test

      - name: Check schemas are up-to-date
        run: |
          bun run generate:schemas
          git diff --exit-code schema/ || (echo "::error::Schemas are stale — run 'bun run generate:schemas' and commit" && exit 1)

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#core@}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
