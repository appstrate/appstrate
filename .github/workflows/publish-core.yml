name: Publish @appstrate/core to npm

on:
  push:
    tags:
      - "core@*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Quality, Tests & Publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/core

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.9"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: TypeScript type-check
        run: tsc --noEmit

      - name: Tests
        run: bun test

      - name: Check schemas are up-to-date
        run: |
          bun run generate:schemas
          git diff --exit-code schema/ || (echo "::error::Schemas are stale — run 'bun run generate:schemas' and commit" && exit 1)

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#core@}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          generate_release_notes: true
