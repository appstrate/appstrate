name: Release Docker Images + CLI Binaries

on:
  push:
    tags:
      - "v*"

# Serialize ALL release runs (single global group, NOT per-tag).
# Two different tags pushed in rapid succession would otherwise race
# on shared cross-tag state:
#   - `metadata-action` with `flavor: latest=auto` (line ~82) pushes
#     the GHCR `:latest` tag based on highest-semver-seen — if v1.0.0
#     finishes after v1.0.1, `:latest` ends up pointing at v1.0.0.
#   - GH Release marking (which tag is `latest`) has the same hazard.
# `cancel-in-progress: false` because once a release has started
# publishing to GHCR / signing binaries / creating the GH Release,
# cancelling mid-flight leaves registries inconsistent — better to
# let it finish, then run the queued tag.
concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/appstrate

permissions:
  contents: write
  packages: write
  # SLSA build provenance via `actions/attest-build-provenance` runs on
  # the CLI binaries in `sign-cli` — keeps the supply-chain attestation
  # attached to the release alongside the minisign-signed checksums.
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: appstrate
            context: .
            dockerfile: Dockerfile
          - name: appstrate-pi
            context: .
            dockerfile: ./runtime-pi/Dockerfile
          - name: appstrate-sidecar
            context: .
            dockerfile: ./runtime-pi/sidecar/Dockerfile
          # Per-integration MCP runner images. Spawned by the sidecar via
          # `docker create` when an AFPS integration declares a local
          # `server.type` — the sidecar resolves the GHCR ref from
          # `RUNNER_IMAGE_*` (docker-compose). Without these published, the
          # daemon falls back to a Docker Hub pull of the bare tag and fails
          # with "pull access denied".
          - name: appstrate-mcp-runner-node
            context: ./runtime-pi/runners/node
            dockerfile: ./runtime-pi/runners/node/Dockerfile
          - name: appstrate-mcp-runner-python
            context: ./runtime-pi/runners/python
            dockerfile: ./runtime-pi/runners/python/Dockerfile
          - name: appstrate-mcp-runner-bun
            context: ./runtime-pi/runners/bun
            dockerfile: ./runtime-pi/runners/bun/Dockerfile
          - name: appstrate-mcp-runner-uv
            context: ./runtime-pi/runners/uv
            dockerfile: ./runtime-pi/runners/uv/Dockerfile
          - name: appstrate-mcp-runner-binary
            context: ./runtime-pi/runners/binary
            dockerfile: ./runtime-pi/runners/binary/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # ── Firecracker manifest-signing pubkey bake (appstrate image only) ──
      # The `appstrate` image ships apps/api SOURCE (no build step), so a
      # self-hosted user can run the runner daemon from it. Bake the real
      # Ed25519 public key over the `__FIRECRACKER_ARTIFACTS_ED25519_PUBKEY__`
      # placeholder in runner/artifacts.ts BEFORE the image build, so shipped
      # source pins the key this release's manifest is signed with (the
      # `Sign Firecracker manifest` step in the `release` job uses the same
      # secret). Fail-closed, mirroring the minisign guard in sign-cli: a
      # release where some builds pin the real key and others still carry the
      # placeholder (mixed signed/unsigned) is worse than a failed release —
      # an unreplaced placeholder makes the daemon refuse to boot
      # (FatalArtifactsError "signing key is not provisioned").
      - name: Setup Bun (Firecracker pubkey derivation)
        if: matrix.name == 'appstrate'
        uses: ./.github/actions/bun-setup

      - name: Bake Firecracker manifest signing pubkey
        if: matrix.name == 'appstrate'
        # Shared with the `build-runner-daemon` job — single source of the bake
        # logic (scripts/bake-firecracker-pubkey.sh) so the two call sites
        # cannot drift. Zero-dep script (node:crypto only) — no `bun install`.
        env:
          FIRECRACKER_MANIFEST_SIGNING_KEY: ${{ secrets.FIRECRACKER_MANIFEST_SIGNING_KEY }}
        run: bash scripts/bake-firecracker-pubkey.sh

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          # `flavor: latest=auto` makes metadata-action add `latest` for
          # the highest non-prerelease semver tag seen — so `v1.0.0`
          # gets `latest`, but `v1.0.0-alpha.50` does NOT. Replaces a
          # previous `type=raw,value=latest,enable={{is_default_branch}}`
          # which never fired on tag-triggered runs (`is_default_branch`
          # is only true for pushes to the default branch, not tags) —
          # leaving `get.appstrate.dev` bootstrap users pulling `:latest`
          # against an image that was never tagged. The CLI now pins
          # `APPSTRATE_VERSION` in the generated `.env` for a belt-and-
          # braces guarantee (ADR-006 lockstep), so `latest` is the
          # compat fallback for consumers that skip the CLI.
          flavor: |
            latest=auto
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          # Stamp the deployed build identity into the image. Only the main
          # Dockerfile declares these ARGs; other matrix images ignore them.
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GIT_SHA=${{ github.sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── CLI single-binary builds (per-target, native runners) ────────────────
  #
  # `bun build --compile --target=bun-<os>-<arch>` cross-compiles the JS
  # bundle + embeds a Bun runtime, but it does NOT cross-install N-API
  # native modules — `@napi-rs/keyring`'s platform-specific binding is
  # resolved at `bun install` time against the host's `process.platform`.
  # Preflight PF-1 confirmed that compiling for linux-x64 from macOS
  # produces a binary that fails at runtime with "Cannot find native
  # binding" on Linux. So each target must build on its own native
  # runner: macOS arm64 on `macos-14` (M1), macOS x64 on `macos-15-intel`
  # (last remaining Intel-macOS runner since GitHub retired macos-13),
  # Linux x64 on `ubuntu-latest`, Linux arm64 on `ubuntu-24.04-arm`
  # (GitHub's free ARM runner tier).
  #
  # Artifact asset names match the pattern `bootstrap.sh` downloads
  # (`appstrate-${OS}-${ARCH}`) — do NOT rename without also updating
  # `scripts/bootstrap.sh`.
  build-cli:
    name: CLI binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: bun-darwin-arm64
            asset: appstrate-darwin-arm64
          # `macos-15-intel` is GitHub's last Intel-mac runner (macos-13
          # retired 2025-12). When it follows, drop the darwin-x64 row
          # and ship only darwin-arm64 — Intel Macs are a rounding error
          # on the CLI install curve by then. Tracked in ADR-006.
          - runner: macos-15-intel
            target: bun-darwin-x64
            asset: appstrate-darwin-x64
          - runner: ubuntu-latest
            target: bun-linux-x64
            asset: appstrate-linux-x64
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: appstrate-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Install dependencies
        run: bun install

      - name: Stamp release version into CLI package.json
        working-directory: apps/cli
        run: |
          # `lib/version.ts` imports `package.json` statically so
          # `bun build --compile` bakes whatever version is on disk at
          # build time. Repo default is `0.0.0` (dev). Overwrite with
          # the tag being released so the shipped binary reports the
          # matching semver on `appstrate --version`. jq is installed
          # on both ubuntu-latest and macos-14/macos-15-intel runner
          # images by default.
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          grep '"version"' package.json

      - name: Compile CLI binary
        working-directory: apps/cli
        run: |
          # `--define '__APPSTRATE_INSTALL_SOURCE__="curl"'` stamps the
          # binary as the curl-channel artefact at build time. See
          # `src/lib/install-source.ts` and issue #249. Source/dev builds
          # leave the identifier undefined and resolve to "unknown".
          bun build --compile \
            --target=${{ matrix.target }} \
            --define '__APPSTRATE_INSTALL_SOURCE__="curl"' \
            src/cli.ts \
            --outfile=${{ matrix.asset }}

      - name: Smoke-test binary (--help + --version) in clean dir
        working-directory: apps/cli
        run: |
          # MUST run from a directory with no sibling package.json — otherwise
          # bugs in transitive deps that resolve `dirname(process.execPath)/package.json`
          # at module top-level (e.g. `@mariozechner/pi-coding-agent`) are masked
          # by `apps/cli/package.json` and only crash on the user's machine.
          # See `apps/cli/src/lib/pi-binary-shim.ts` for the post-mortem.
          TMP="$(mktemp -d)"
          cp "./${{ matrix.asset }}" "$TMP/appstrate"
          "$TMP/appstrate" --help
          REPORTED=$("$TMP/appstrate" --version)
          rm -rf "$TMP"
          EXPECTED="${GITHUB_REF_NAME#v}"
          echo "Binary reports: $REPORTED / expected: $EXPECTED"
          if [ "$REPORTED" != "$EXPECTED" ]; then
            echo "::error::Version mismatch — compiled binary reports '$REPORTED', tag is '$EXPECTED'."
            echo "::error::Check that the 'Stamp release version' step ran before 'Compile CLI binary'."
            exit 1
          fi

      # `--help` and `--version` do not exercise the `@napi-rs/keyring`
      # native module. A cross-compile misconfiguration or a future Bun
      # regression could ship a binary whose `require()` of the `.node`
      # has been silently replaced by a throw stub — it would pass the
      # checks above and crash the first time a user runs `login`. Build
      # and run a tiny probe against the same `--target` to force the
      # native binding to load.
      - name: Smoke-test keyring native binding
        working-directory: apps/cli
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            scripts/ci-keyring-probe.ts \
            --outfile=ci-keyring-probe
          ./ci-keyring-probe
          rm -f ci-keyring-probe

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: apps/cli/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  # ─── CLI supply-chain: minisign-signed checksums + SLSA provenance ────────
  #
  # Closes the trust chain from `get.appstrate.dev` down to the running
  # CLI binary. The published `bootstrap.sh` downloads the binary from
  # this release + the `checksums.txt` + `checksums.txt.minisig` produced
  # here, verifies the signature against `scripts/appstrate.pub` (shipped
  # alongside), and refuses to exec the binary unless its SHA-256
  # matches. Without this job the bootstrapper has no cryptographic
  # anchor and the whole curl | bash path degrades to TLS-only trust.
  sign-cli:
    name: Sign CLI binaries
    # Also `needs: build-runner-daemon` so the daemon binaries can be folded
    # into the SAME signed checksums.txt (see "Stage runner daemon binaries").
    # `if: always() && build-cli success` keeps the CLI signable even when the
    # decoupled 90-min daemon build flaked — the daemon-staging step below is
    # guarded so a CLI-only manifest is signed in that case.
    needs: [build-cli, build-runner-daemon]
    if: always() && needs.build-cli.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Download CLI + runner daemon binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # `docker/build-push-action` auto-uploads
          # `<name>~<name>~<id>.dockerbuild` summary artifacts to the
          # same run; without a pattern filter, download-artifact pulls
          # them too — and they're large enough to flake the 5-retry
          # blob download budget. Restrict to the binary asset names.
          # This pattern also matches the `appstrate-runner-*` daemon
          # artifacts (staged into the signed manifest below when present).
          pattern: appstrate-*
          path: cli-binaries
          merge-multiple: false

      - name: Stage CLI binaries
        id: stage
        run: |
          # Copy ONLY the four CLI binaries by exact name into out/ — an
          # explicit list, not `find -name appstrate-*`, so the daemon
          # artifacts (appstrate-runner-*, sharing the appstrate-* download
          # pattern) do NOT leak into the signed manifest here. The daemon
          # binaries are folded in deterministically by the next step.
          mkdir -p out
          for asset in appstrate-darwin-arm64 appstrate-darwin-x64 \
                       appstrate-linux-x64 appstrate-linux-arm64; do
            src="$(find cli-binaries -type f -name "$asset" | head -1)"
            if [ -z "$src" ]; then
              echo "::error::Missing CLI binary: $asset"
              exit 1
            fi
            cp "$src" "out/$asset"
          done
          ls -la out/

      - name: Stage runner daemon binaries into the signed manifest
        # Fold the daemon binaries into the SAME checksums.txt the CLI is signed
        # under, so `appstrate runner install` verifies the daemon against a
        # minisign-signed digest instead of a bare same-origin .sha256 sidecar
        # (a trust downgrade). Guarded on the daemon job: the release is
        # decoupled from it, so when it failed we sign a CLI-only manifest and
        # the daemon simply isn't part of this release.
        if: needs.build-runner-daemon.result == 'success'
        run: |
          for asset in appstrate-runner-x86_64 appstrate-runner-aarch64; do
            src="$(find cli-binaries -type f -name "$asset" | head -1)"
            if [ -z "$src" ]; then
              echo "::error::Missing runner daemon binary: $asset"
              exit 1
            fi
            cp "$src" "out/$asset"
          done
          ls -la out/

      - name: Generate checksums
        run: |
          cd out
          # `shasum -a 256` output format matches what `sha256sum -c`
          # expects, so `bootstrap.sh` can verify with either tool. out/
          # holds only binaries (no .sha256 sidecars), so the glob is clean.
          sha256sum appstrate-* > checksums.txt
          cat checksums.txt

      - name: Sign checksums with minisign
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          VERSION: ${{ github.ref_name }}
        run: |
          # Secrets are required: we intentionally fail rather than ship
          # a release with unsigned binaries. Mixed signed/unsigned
          # releases would force `bootstrap.sh` to tolerate missing
          # signatures, which defeats the whole verification flow.
          if [ -z "${MINISIGN_SECRET_KEY:-}" ] || [ -z "${MINISIGN_PASSWORD:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY + MINISIGN_PASSWORD secrets must be set."
            echo "::error::Rotation SOP: docs/adr/ADR-006-cli-device-flow-monorepo.md"
            exit 1
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq minisign
          umask 077
          printf '%s' "$MINISIGN_SECRET_KEY" > /tmp/minisign.key
          printf '%s\n' "$MINISIGN_PASSWORD" | \
            minisign -S -s /tmp/minisign.key \
              -t "appstrate CLI $VERSION" \
              -m out/checksums.txt
          rm -f /tmp/minisign.key
          # Ship the public key next to the signed checksums so air-gapped
          # users and second-party mirrors have everything they need in
          # one place. `scripts/appstrate.pub` is the source of truth;
          # copying to `out/` just avoids a second checkout on the
          # consumer side.
          cp scripts/appstrate.pub out/appstrate.pub

      - name: Attest CLI binary provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: out/appstrate-*

      - name: Upload signed bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cli-signed-bundle
          path: |
            out/checksums.txt
            out/checksums.txt.minisig
            out/appstrate.pub
          if-no-files-found: error
          retention-days: 7

  # ─── Firecracker guest artifacts (prebuilt kernel + rootfs) ───────────────
  #
  # Publishes versioned, checksum-verified guest artifacts so the
  # `appstrate-runner` daemon (issue #819, phase 2) downloads them at boot
  # instead of requiring an on-host `bun run firecracker:build` (docker +
  # sudo + a full checkout, ~10 min / ~1.3 GB per host).
  #
  # Built natively per arch (no QEMU): x86_64 on ubuntu-latest, aarch64 on
  # ubuntu-24.04-arm (GitHub's free ARM runner). Both scripts run their
  # heavy lifting inside Docker (build-kernel.sh) / via docker build
  # (build-rootfs.sh), so the runner only needs docker + e2fsprogs + zstd.
  #
  # Each arch uploads three workflow artifacts consumed by the `release`
  # job: the kernel, the zstd-compressed rootfs, and a manifest fragment
  # (`{ "<arch>": { vmlinux, rootfs } }`) that `release` merges into the
  # single `firecracker-artifacts-manifest.json`. The resolver verifies the
  # DECOMPRESSED rootfs sha256 against the manifest, so `rootfs.sha256` is
  # the digest of the ext4 image and `rootfs.compressed_size` is the `.zst`.
  # The merged manifest is Ed25519-signed in the `release` job (detached
  # `firecracker-artifacts-manifest.json.sig` asset) — the daemon verifies
  # that signature against a source-pinned public key BEFORE trusting any
  # hash inside the manifest (P1-4, runner/artifacts.ts).
  firecracker-artifacts:
    name: Firecracker guest artifacts (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install e2fsprogs + zstd
        run: |
          sudo apt-get update -qq
          # e2fsprogs (mkfs.ext4/debugfs) is usually preinstalled; zstd is
          # required to compress the rootfs asset. Install both to be safe.
          sudo apt-get install -y -qq e2fsprogs zstd

      - name: Build guest kernel
        run: bash apps/api/src/modules/firecracker/scripts/build-kernel.sh ./data/firecracker/vmlinux

      - name: Build guest rootfs
        run: bash apps/api/src/modules/firecracker/scripts/build-rootfs.sh ./data/firecracker/rootfs.ext4

      - name: Compress rootfs + compute checksums
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          # Kernel ships uncompressed; rootfs ships zstd-compressed. `-19 -T0`
          # trades CI time for a smaller asset (the download runs once per host).
          cp ./data/firecracker/vmlinux "vmlinux-${ARCH}"
          zstd -19 -T0 -f -o "rootfs-${ARCH}.ext4.zst" ./data/firecracker/rootfs.ext4

          VMLINUX_SIZE=$(stat -c%s "vmlinux-${ARCH}")
          VMLINUX_SHA=$(sha256sum "vmlinux-${ARCH}" | cut -d' ' -f1)
          # Manifest sha256 = digest of the DECOMPRESSED ext4 (what the daemon
          # verifies after zstd decompression); compressed_size = the .zst asset.
          ROOTFS_SIZE=$(stat -c%s ./data/firecracker/rootfs.ext4)
          ROOTFS_SHA=$(sha256sum ./data/firecracker/rootfs.ext4 | cut -d' ' -f1)
          ROOTFS_CSIZE=$(stat -c%s "rootfs-${ARCH}.ext4.zst")

          jq -n \
            --arg arch "$ARCH" \
            --arg vsha "$VMLINUX_SHA" --argjson vsize "$VMLINUX_SIZE" \
            --arg rsha "$ROOTFS_SHA" --argjson rsize "$ROOTFS_SIZE" --argjson rcsize "$ROOTFS_CSIZE" \
            '{($arch): {vmlinux: {sha256: $vsha, size: $vsize}, rootfs: {sha256: $rsha, size: $rsize, compressed_size: $rcsize}}}' \
            > "fragment-${ARCH}.json"
          cat "fragment-${ARCH}.json"

      - name: Upload guest artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: firecracker-${{ matrix.arch }}
          path: |
            vmlinux-${{ matrix.arch }}
            rootfs-${{ matrix.arch }}.ext4.zst
            fragment-${{ matrix.arch }}.json
          if-no-files-found: error
          retention-days: 7

  # ─── Runner daemon binary (compiled appstrate-runner) ────────────────────
  #
  # `appstrate runner install` (issue #819, phase 3) downloads THIS compiled
  # binary onto a bare KVM host — no checkout, no bun, no on-host build. It is
  # deliberately SEPARATE from the CLI: zero firecracker code ships in the CLI,
  # zero CLI code ships in the daemon.
  #
  # `bun build --compile` embeds a Bun runtime + the daemon's JS closure. The
  # daemon has no N-API native modules (unlike the CLI's keyring), so a plain
  # cross-compile would suffice — but we build each arch on its OWN native
  # runner so the smoke step below can actually EXECUTE the binary and prove
  # the compile + env-decoupling on the target arch. x86_64 on ubuntu-latest,
  # aarch64 on ubuntu-24.04-arm (GitHub's free ARM tier), mirroring the
  # firecracker-artifacts matrix.
  #
  # Asset names (`appstrate-runner-<arch>`) match `daemonAssetName()` in
  # apps/cli/src/lib/runner/constants.ts — do NOT rename without updating it.
  build-runner-daemon:
    name: Runner daemon (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            target: bun-linux-x64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            target: bun-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Install dependencies
        run: bun install

      # Shared bake step (scripts/bake-firecracker-pubkey.sh, also called by
      # `build-and-push`): replace the `__FIRECRACKER_ARTIFACTS_ED25519_PUBKEY__`
      # placeholder with the real public key BEFORE the compile below embeds
      # runner/artifacts.ts into the daemon binary. This is the primary consumer
      # of the pinned key — the compiled daemon verifies every downloaded
      # manifest against it. Fail-closed (mirrors the minisign guard in
      # sign-cli): shipping a daemon that still carries the placeholder means
      # every boot dies with FatalArtifactsError "signing key is not provisioned".
      - name: Bake Firecracker manifest signing pubkey
        env:
          FIRECRACKER_MANIFEST_SIGNING_KEY: ${{ secrets.FIRECRACKER_MANIFEST_SIGNING_KEY }}
        run: bash scripts/bake-firecracker-pubkey.sh

      - name: Compile runner daemon binary
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            apps/api/src/modules/firecracker/runner/daemon.ts \
            --outfile=appstrate-runner-${{ matrix.arch }}

      # Boot the compiled binary with ONLY the FIRECRACKER_RUNNER_* variables
      # (+ FIRECRACKER_ARTIFACTS_LOCAL=1 to skip the network download) and
      # assert it reaches the HOST PREFLIGHT error inside orchestrator
      # initialize() — /dev/kvm and the kernel/rootfs are absent on a GitHub
      # runner, so initialize() must fail. This proves two things at once:
      #   1. `bun build --compile` produced a runnable binary (it started).
      #   2. The daemon booted WITHOUT the platform env schema — no
      #      BETTER_AUTH_SECRET / CONNECTION_ENCRYPTION_KEY / @appstrate/env.
      #      A regression that re-coupled the closure to @appstrate/env would
      #      crash at env-parse BEFORE preflight, which this step catches.
      - name: Smoke-test compiled binary (env-decoupled preflight)
        run: |
          set +e
          OUT=$(env -i \
            PATH="$PATH" \
            FIRECRACKER_RUNNER_TOKEN=0123456789abcdef0123456789abcdef \
            FIRECRACKER_RUNNER_PLATFORM_URL=http://10.0.0.1:3000 \
            FIRECRACKER_ARTIFACTS_LOCAL=1 \
            ./appstrate-runner-${{ matrix.arch }} 2>&1)
          CODE=$?
          echo "--- daemon output ---"
          echo "$OUT"
          echo "--- exit code: $CODE ---"
          if [ "$CODE" -eq 0 ]; then
            echo "::error::Daemon exited 0 — expected a host-preflight failure on a non-KVM runner."
            exit 1
          fi
          # Must reach the orchestrator's host preflight (KVM / kernel / rootfs).
          if ! echo "$OUT" | grep -qiE "orchestrator initialize|prerequisites missing|/dev/kvm|requires a Linux host with KVM"; then
            echo "::error::Daemon did not reach the KVM/Linux host preflight — compile or boot-order regression."
            exit 1
          fi
          # Must NOT fail on the platform env schema — that would mean the
          # daemon closure re-coupled to @appstrate/env (env-decoupling broke).
          if echo "$OUT" | grep -qE "BETTER_AUTH_SECRET|CONNECTION_ENCRYPTION_KEY|UPLOAD_SIGNING_SECRET|RUN_TOKEN_SECRET|CONNECT_SESSION_SECRET"; then
            echo "::error::Daemon required a platform env var — env decoupling regressed."
            exit 1
          fi
          echo "Runner daemon smoke passed: compiled, env-decoupled, reached host preflight."

      - name: Upload runner daemon binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: appstrate-runner-${{ matrix.arch }}
          # No same-origin `.sha256` sidecar: the daemon binary is verified
          # exclusively against the minisign-signed `checksums.txt` (folded in
          # by the sign-cli job, downloaded by `appstrate runner install`).
          path: appstrate-runner-${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 7

  release:
    # The CORE release (GH Release + CLI binaries + signed checksums) must not
    # be hard-blocked by the firecracker guest-artifact / runner-daemon builds:
    # `firecracker-artifacts` is a ~90-min kernel+rootfs build (incl.
    # ubuntu-24.04-arm) and a single flake would otherwise sink every release.
    # So depend on them for ordering but gate only on the core jobs, and upload
    # the firecracker/daemon assets conditionally (per-step `if` on their
    # results). A release published without runner assets is handled on the
    # consumer side: `appstrate runner install` gives an actionable 404 error
    # (apps/cli/src/lib/runner/download.ts) pointing at a version that has them.
    needs: [build-and-push, build-cli, sign-cli, firecracker-artifacts, build-runner-daemon]
    if: >-
      always() &&
      needs.build-and-push.result == 'success' &&
      needs.build-cli.result == 'success' &&
      needs.sign-cli.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Download CLI binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # Same filter as the sign job — skip the docker-buildx summary
          # artifacts that share the run.
          pattern: appstrate-*
          path: cli-binaries
          # Each artifact is extracted into its own subdir under `path`;
          # flatten by globbing in the release step below.
          merge-multiple: false

      - name: Download signed bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cli-signed-bundle
          path: cli-signed

      - name: Download Firecracker guest artifacts
        # Decoupled build (may have failed) — skip cleanly and the manifest +
        # asset uploads below are guarded on the same condition.
        if: needs.firecracker-artifacts.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # One artifact per arch (firecracker-x86_64, firecracker-aarch64),
          # each extracted into its own subdir under `path`.
          pattern: firecracker-*
          path: firecracker-assets
          merge-multiple: false

      - name: Download runner daemon binaries
        # Decoupled build (may have failed) — skip cleanly; the release simply
        # ships without daemon assets for this tag.
        if: needs.build-runner-daemon.result == 'success'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          # One artifact per arch (appstrate-runner-x86_64,
          # appstrate-runner-aarch64), each holding just the daemon binary
          # (verified against the signed checksums.txt, no .sha256 sidecar).
          pattern: appstrate-runner-*
          path: runner-daemon
          merge-multiple: false

      - name: Assemble Firecracker manifest
        # Only when the guest artifacts were built + downloaded above.
        if: needs.firecracker-artifacts.result == 'success'
        run: |
          set -euo pipefail
          # guest_protocol is the single source of truth in the daemon source
          # — read it here so the manifest can never drift from the resolver.
          # `|| true` + explicit check so a moved/renamed constant fails with a
          # clear message instead of a bare pipefail grep exit.
          GUEST_PROTOCOL=$(grep -oP 'GUEST_PROTOCOL_VERSION = \K[0-9]+' \
            apps/api/src/modules/firecracker/runner/artifacts.ts || true)
          if [ -z "$GUEST_PROTOCOL" ]; then
            echo "::error::Could not parse GUEST_PROTOCOL_VERSION from runner/artifacts.ts — the source constant was moved or its shape changed. The firecracker manifest cannot be assembled without it; update this grep."
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          # Merge the per-arch fragments ({ "<arch>": {...} }) into the
          # combined manifest wrapped with version + guest_protocol.
          jq -s \
            --arg v "$VERSION" \
            --argjson gp "$GUEST_PROTOCOL" \
            '{version: $v, guest_protocol: $gp, artifacts: add}' \
            firecracker-assets/*/fragment-*.json \
            > firecracker-artifacts-manifest.json
          cat firecracker-artifacts-manifest.json

      - name: Setup Bun (Firecracker manifest signing)
        if: needs.firecracker-artifacts.result == 'success'
        uses: ./.github/actions/bun-setup

      - name: Sign Firecracker manifest
        # The manifest is the ROOT OF TRUST for the guest kernel/rootfs hashes
        # — the daemon verifies its detached Ed25519 signature against the
        # source-pinned public key (baked over the placeholder by the
        # `Bake Firecracker manifest signing pubkey` steps, same secret)
        # BEFORE trusting any hash inside it. Signature format: base64 raw
        # 64-byte Ed25519 over the exact manifest bytes, one line
        # (runner/artifacts.ts verifyManifestSignature).
        if: needs.firecracker-artifacts.result == 'success'
        env:
          FIRECRACKER_MANIFEST_SIGNING_KEY: ${{ secrets.FIRECRACKER_MANIFEST_SIGNING_KEY }}
        run: |
          # Fail-closed, mirroring the minisign guard in sign-cli: the daemon
          # HARD-FAILS on a release that publishes a manifest without its
          # `.sig` asset (fetchManifestSignature → FatalArtifactsError), so
          # publishing unsigned would brick `runner install` for this tag —
          # worse than a failed release.
          if [ -z "${FIRECRACKER_MANIFEST_SIGNING_KEY:-}" ]; then
            echo "::error::FIRECRACKER_MANIFEST_SIGNING_KEY secret must be set — refusing to publish an unsigned Firecracker artifacts manifest."
            echo "::error::Generate a keypair with: bun scripts/sign-firecracker-manifest.ts --generate"
            exit 1
          fi
          # Signs + self-verifies with the derived public key (the exact check
          # the daemon performs), writing firecracker-artifacts-manifest.json.sig.
          bun scripts/sign-firecracker-manifest.ts firecracker-artifacts-manifest.json

      - name: Generate release notes
        id: notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            echo "body=Initial release" >> "$GITHUB_OUTPUT"
          else
            NOTES=$(git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges)
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "body<<$EOF" >> "$GITHUB_OUTPUT"
            echo "## What's Changed" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "$NOTES" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "## Docker Images" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo '```sh' >> "$GITHUB_OUTPUT"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/appstrate:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/appstrate-pi:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "docker pull ghcr.io/${{ github.repository_owner }}/appstrate-sidecar:${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo '```' >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo "## Install the CLI" >> "$GITHUB_OUTPUT"
            echo "" >> "$GITHUB_OUTPUT"
            echo '```sh' >> "$GITHUB_OUTPUT"
            echo "curl -fsSL https://get.appstrate.dev | bash" >> "$GITHUB_OUTPUT"
            echo '```' >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: ${{ steps.notes.outputs.body }}
          # `fail_on_unmatched_files: false` (the default, pinned explicit for
          # intent): the firecracker/runner-daemon globs match nothing when
          # those decoupled jobs failed and their downloads were skipped — the
          # release must still publish the CLI + signed checksums for this tag.
          fail_on_unmatched_files: false
          # Flatten the per-artifact subdirs into a single glob so every
          # CLI binary lands as a top-level asset on the release, then
          # append the signed checksum bundle so `bootstrap.sh` can
          # verify integrity + provenance before chmod+x on a fresh host.
          files: |
            cli-binaries/*/appstrate-*
            cli-signed/checksums.txt
            cli-signed/checksums.txt.minisig
            cli-signed/appstrate.pub
            firecracker-assets/*/vmlinux-*
            firecracker-assets/*/rootfs-*.ext4.zst
            firecracker-artifacts-manifest.json
            firecracker-artifacts-manifest.json.sig
            runner-daemon/*/appstrate-runner-*
