name: Test Installer

on:
  pull_request:
    paths:
      - "scripts/install.sh"
      - "test/install/**"
      - "examples/self-hosting/**"
      - ".github/workflows/test-install.yml"
  push:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "test/install/**"
      - ".github/workflows/test-install.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: shellcheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # 2.0.0
        with:
          scandir: ./scripts
          severity: warning

      - name: shfmt (format check)
        run: |
          curl -fsSL -o /tmp/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          chmod +x /tmp/shfmt
          /tmp/shfmt -d -i 2 -ci scripts/install.sh

  unit-bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run BATS unit tests
        run: |
          docker run --rm -v "$PWD:/code" -w /code --entrypoint sh \
            bats/bats:1.11.0 -c '
              apk add --no-cache openssl >/dev/null
              bats test/install/install.bats
            '

  smoke-dind:
    runs-on: ubuntu-latest
    needs: [static, unit-bats]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Use 'latest' tag for image pulls during PRs — refs/pull/N/merge is not a
      # publishable image tag. On main pushes, the same flow validates 'latest'
      # which reflects the most recent release.
      - name: Render install.sh
        run: |
          sed "s|__APPSTRATE_VERSION__|latest|g" \
            scripts/install.sh > /tmp/install.sh
          chmod +x /tmp/install.sh

      - name: Smoke install in DinD (Linux E2E)
        run: |
          docker run --rm --privileged \
            -v /tmp/install.sh:/install.sh:ro \
            -v "${{ github.workspace }}/examples/self-hosting:/assets:ro" \
            -e APPSTRATE_PORT=3000 \
            -e APPSTRATE_ASSETS_DIR=/assets \
            -e DOCKER_TLS_CERTDIR= \
            docker:27-dind sh -c '
              set -e
              # Standalone DinD: force client to use local socket (no DNS "docker" service)
              export DOCKER_HOST=unix:///var/run/docker.sock

              dockerd-entrypoint.sh > /var/log/dockerd.log 2>&1 &
              echo "Waiting for inner dockerd..."
              for i in $(seq 1 60); do
                docker info >/dev/null 2>&1 && break
                sleep 1
              done
              docker info >/dev/null || { tail -50 /var/log/dockerd.log; exit 1; }
              apk add --no-cache bash curl openssl lsof >/dev/null

              echo "── 1. First install (fresh) ──"
              bash /install.sh

              echo "── 2. Health probe ──"
              curl -fsS --max-time 10 http://localhost:3000/ >/dev/null
              echo "✓ healthy"

              echo "── 3. API responding ──"
              curl -fsS --max-time 10 http://localhost:3000/api/openapi.json | head -c 200 >/dev/null
              echo "✓ API ok"

              echo "── 4. Container fleet ──"
              CF=/root/.appstrate/docker-compose.yml
              EF=/root/.appstrate/.env
              for svc in appstrate postgres redis minio; do
                status=$(docker compose -f "$CF" --env-file "$EF" ps --format json "$svc" | head -1)
                echo "$svc: $status"
                echo "$status" | grep -qi "running" \
                  || { echo "✗ $svc not running"; exit 1; }
              done
              echo "✓ all services running"

              echo "── 5. Docker socket access from inside platform ──"
              docker compose -f "$CF" --env-file "$EF" exec -T appstrate \
                sh -c "ls -la /var/run/docker.sock && id" || {
                  echo "✗ socket not accessible"; exit 1; }
              echo "✓ socket access ok"

              echo "── 6. Second run (must be noop) ──"
              bash /install.sh 2>&1 | tee /tmp/run2.log
              grep -q "Already at" /tmp/run2.log

              echo "── 7. Teardown ──"
              docker compose -f "$CF" --env-file "$EF" down -v
              rm -rf /root/.appstrate
              echo "✓ clean teardown"
            '
