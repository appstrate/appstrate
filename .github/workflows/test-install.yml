name: Test Installer

on:
  pull_request:
    paths:
      - "scripts/bootstrap.sh"
      - "scripts/verify.sh"
      - "scripts/appstrate.pub"
      - ".github/workflows/test-install.yml"
      - ".github/workflows/publish-installer.yml"
  push:
    branches: [main]
    paths:
      - "scripts/bootstrap.sh"
      - "scripts/verify.sh"
      - ".github/workflows/test-install.yml"
      - ".github/workflows/publish-installer.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: shellcheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # 2.0.0
        with:
          scandir: ./scripts
          severity: warning

      - name: shfmt (format check)
        env:
          SHFMT_VERSION: "3.10.0"
          SHFMT_SHA256: "1f57a384d59542f8fac5f503da1f3ea44242f46dff969569e80b524d64b71dbc"
        run: |
          curl -fsSL -o /tmp/shfmt \
            "https://github.com/mvdan/sh/releases/download/v${SHFMT_VERSION}/shfmt_v${SHFMT_VERSION}_linux_amd64"
          echo "${SHFMT_SHA256}  /tmp/shfmt" | sha256sum --check --strict
          chmod +x /tmp/shfmt
          /tmp/shfmt -d -i 2 -ci scripts/bootstrap.sh scripts/verify.sh

  workflow-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: actionlint (all workflows)
        # Pinned installer — runs actionlint against every YAML in .github/workflows/.
        # SHA256 of the download script is verified before exec to prevent supply-
        # chain injection via a compromised rhysd/actionlint tag.
        # -ignore SC2129: pre-existing style warning in release.yml, not blocking.
        env:
          DOWNLOAD_SCRIPT_SHA256: "72fa3e45ac20f3c3a512d6747b4fcf719e21f890e8c43e78d48a41fdfb900c4e"
        run: |
          curl -fsSL -o /tmp/download-actionlint.bash \
            https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash
          echo "${DOWNLOAD_SCRIPT_SHA256}  /tmp/download-actionlint.bash" | sha256sum --check --strict
          bash /tmp/download-actionlint.bash 1.7.12
          ./actionlint -color -ignore 'SC2129' .github/workflows/*.yml

  # End-to-end dry-run of the publish pipeline (render + minisign sign +
  # verify.sh flow) using a throwaway keypair. Catches sed substitution
  # bugs, minisign invocation syntax, and verify.sh integration issues
  # before a real tag push exercises publish-installer.yml in anger.
  publish-dry-run:
    runs-on: ubuntu-latest
    needs: [static, workflow-lint]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install minisign
        run: sudo apt-get update -qq && sudo apt-get install -y -qq minisign

      - name: Simulate publish-installer.yml render + sign
        run: |
          set -euo pipefail
          mkdir -p out pages

          # --- Render bootstrap.sh as install.sh (mirrors publish-installer.yml "Render" step) ---
          # Published filename stays `install.sh` so legacy URLs keep working;
          # content is now the thin CLI-downloader bootstrap.
          sed "s|__APPSTRATE_VERSION__|v1.0.0-dry|g" scripts/bootstrap.sh > out/install.sh
          if grep -q "__APPSTRATE_VERSION__" out/install.sh; then
            echo "::error::version placeholder not replaced"; exit 1
          fi
          bash -n out/install.sh

          # --- Throwaway keypair (-W = unencrypted, CI-friendly) ---
          # Written to /tmp to avoid clobbering a real scripts/appstrate.pub
          # if one is ever committed — the dry-run must verify its OWN key,
          # not the committed one.
          umask 077
          minisign -G -W -f -p /tmp/dry.pub -s /tmp/dry.key

          # --- Sign (mirrors publish-installer.yml minisign step) ---
          minisign -S -s /tmp/dry.key \
            -t "appstrate v1.0.0-dry (latest)" \
            -m out/install.sh

          # --- Substitute pubkey into verify.sh (mirrors sync step) ---
          PUBKEY=$(grep -v '^untrusted' /tmp/dry.pub | head -1 | tr -d '\n')
          if [ -z "$PUBKEY" ]; then
            echo "::error::pubkey extraction failed"; cat /tmp/dry.pub; exit 1
          fi
          sed "s|__APPSTRATE_MINISIGN_PUBKEY__|${PUBKEY}|" scripts/verify.sh > pages/verify.sh
          if grep -q "__APPSTRATE_MINISIGN_PUBKEY__" pages/verify.sh; then
            echo "::error::pubkey placeholder not substituted"; exit 1
          fi
          grep -q "APPSTRATE_PUBKEY=\"${PUBKEY}\"" pages/verify.sh

          # --- Independent signature check (proves the render+sign pipeline) ---
          cp out/install.sh pages/install.sh
          cp out/install.sh.minisig pages/install.sh.minisig
          minisign -V -p /tmp/dry.pub -m pages/install.sh
          echo "✓ render + sign pipeline OK"

      - name: Simulate verify.sh end-to-end (happy + tampered)
        run: |
          set -euo pipefail

          # Swap the real bootstrap output for a stub (avoids actually
          # downloading a binary + execing it). Re-sign the stub with the
          # same key so verify.sh accepts it.
          cat > pages/install.sh <<'STUB'
          #!/usr/bin/env bash
          echo "STUB_INSTALLER_RAN"
          exit 0
          STUB
          minisign -S -s /tmp/dry.key -t "dry-run stub" -m pages/install.sh
          rm -f /tmp/dry.key

          # Serve pages/ locally for verify.sh to fetch from.
          cd pages
          python3 -m http.server 8765 >/dev/null 2>&1 &
          SERVER=$!
          trap 'kill $SERVER 2>/dev/null || true' EXIT
          sleep 1

          # --- Happy path ---
          OUT=$(APPSTRATE_BASE_URL=http://localhost:8765 bash verify.sh 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "Signature valid" \
            || { echo "::error::verify.sh did not emit 'Signature valid'"; exit 1; }
          echo "$OUT" | grep -q "STUB_INSTALLER_RAN" \
            || { echo "::error::verify.sh did not exec install.sh"; exit 1; }
          echo "✓ happy path OK"

          # --- Tamper path: corrupt install.sh after signing ---
          echo "echo TAMPERED" >> install.sh
          set +e
          TAMPER_OUT=$(APPSTRATE_BASE_URL=http://localhost:8765 bash verify.sh 2>&1)
          tamper_exit=$?
          set -e
          echo "$TAMPER_OUT"
          if [ "$tamper_exit" -eq 0 ]; then
            echo "::error::verify.sh accepted a tampered install.sh"; exit 1
          fi
          echo "$TAMPER_OUT" | grep -qE "(Signature verification FAILED|tampered)" \
            || { echo "::error::verify.sh did not report tampering"; exit 1; }
          echo "✓ tamper path OK"

  # End-to-end exercise of bootstrap.sh's internal verification path:
  # fetches checksums.txt + .minisig, verifies minisign against the
  # baked-in pubkey, verifies SHA-256 of the binary, installs, execs.
  # We stage a fake release on a local HTTP server + rewrite bootstrap.sh's
  # URL_BASE + pubkey constant so the trust chain uses our throwaway keypair.
  # This guards against regressions in the checksum/signature gate that
  # otherwise only surface after a real tag push.
  #
  # All scenarios run in ONE step because each `run:` block spawns a fresh
  # shell (the background HTTP server + `trap` don't persist across steps).
  bootstrap-verify-dry-run:
    runs-on: ubuntu-latest
    needs: [static, workflow-lint]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install minisign
        run: sudo apt-get update -qq && sudo apt-get install -y -qq minisign

      - name: Exercise bootstrap.sh verification path end-to-end
        run: |
          set -euo pipefail

          # ── Stage a fake release tree served under /release/* ──────────
          ROOT="$GITHUB_WORKSPACE/served"
          mkdir -p "$ROOT/release"

          # Fake CLI binary: prints a marker so we can assert bootstrap
          # actually exec'd it at the tail of the trust chain. Echoes all
          # argv so we can also assert the `--yes` contract (#199): the
          # bootstrap MUST pass --yes to sidestep the Bun macOS setRawMode
          # regression in the compiled binary.
          cat > "$ROOT/release/appstrate-linux-x64" <<'CLI'
          #!/usr/bin/env bash
          echo "FAKE_CLI_RAN subcommand=$1 argv=$*"
          exit 0
          CLI
          chmod +x "$ROOT/release/appstrate-linux-x64"

          # Checksum manifest — `<hash>  <filename>` format matches the
          # GNU `sha256sum -c` input format bootstrap.sh uses.
          (cd "$ROOT/release" && sha256sum appstrate-linux-x64 > checksums.txt)

          # Throwaway signing key (CI-friendly, unencrypted).
          umask 077
          minisign -G -W -f -p /tmp/dry.pub -s /tmp/dry.key
          minisign -S -s /tmp/dry.key -t "dry-run" -m "$ROOT/release/checksums.txt"
          cp "$ROOT/release/checksums.txt.minisig" "$ROOT/release/checksums.txt.minisig.signed"

          PUBKEY=$(grep -v '^untrusted' /tmp/dry.pub | head -1 | tr -d '\n')

          # ── Rewrite bootstrap.sh: URL_BASE → localhost, pubkey → ours ──
          # `latest` and pinned paths both hit the same served dir because
          # we only maintain one release tree.
          # shellcheck disable=SC2016  # `${VERSION}` is literal in the sed pattern
          sed \
            -e "s|__APPSTRATE_VERSION__|v1.0.0-dry|g" \
            -e 's|https://github.com/appstrate/appstrate/releases/latest/download|http://localhost:8766/release|' \
            -e 's|https://github.com/appstrate/appstrate/releases/download/${VERSION}|http://localhost:8766/release|' \
            -e "s|APPSTRATE_MINISIGN_PUBKEY=\"[^\"]*\"|APPSTRATE_MINISIGN_PUBKEY=\"${PUBKEY}\"|" \
            scripts/bootstrap.sh > /tmp/bootstrap.sh
          bash -n /tmp/bootstrap.sh

          grep -q "http://localhost:8766/release" /tmp/bootstrap.sh \
            || { echo "::error::URL_BASE rewrite did not take effect"; exit 1; }
          grep -q "APPSTRATE_MINISIGN_PUBKEY=\"${PUBKEY}\"" /tmp/bootstrap.sh \
            || { echo "::error::pubkey rewrite did not take effect"; exit 1; }

          # ── Pre-create the install destinations ──────────────────────
          # bootstrap.sh calls `install -m 0755 …` which does NOT create
          # intermediate directories; we need each $APPSTRATE_BIN_DIR to
          # exist up-front or `install` exits non-zero before the happy
          # banner is printed (which would swallow the output via $(…)).
          mkdir -p \
            "$GITHUB_WORKSPACE/bin" \
            "$GITHUB_WORKSPACE/bin-tampered" \
            "$GITHUB_WORKSPACE/bin-sig" \
            "$GITHUB_WORKSPACE/bin-nomini" \
            "$GITHUB_WORKSPACE/bin-skip" \
            "$GITHUB_WORKSPACE/bin-skip-noci" \
            "$GITHUB_WORKSPACE/bin-empty"

          # ── Start the HTTP server for the whole job ───────────────────
          cd "$ROOT"
          python3 -m http.server 8766 >/tmp/httpd.log 2>&1 &
          SERVER=$!
          trap 'kill $SERVER 2>/dev/null || true; rm -f /tmp/dry.key' EXIT
          sleep 1

          # ── Scenario 1: happy path ────────────────────────────────────
          echo "::group::happy path"
          export APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin"
          export PATH="$APPSTRATE_BIN_DIR:$PATH"

          # Run with `set +e` around the capture so a failing bootstrap
          # still surfaces its stdout/stderr in the log instead of being
          # killed silently by `set -e` at the `OUT=$(...)` assignment.
          set +e
          OUT=$(bash /tmp/bootstrap.sh 2>&1)
          rc=$?
          set -e
          echo "$OUT"
          test "$rc" -eq 0 \
            || { echo "::error::bootstrap exited $rc on the happy path"; exit 1; }
          echo "$OUT" | grep -q "Integrity + provenance verified" \
            || { echo "::error::bootstrap did not emit the verified banner"; exit 1; }
          echo "$OUT" | grep -q "FAKE_CLI_RAN subcommand=install" \
            || { echo "::error::bootstrap did not exec the installed binary"; exit 1; }
          # #199: bootstrap MUST pass --yes so the Bun compile + macOS
          # setRawMode regression can't hang the install. A future refactor
          # that drops `--yes` from the exec line regresses the whole
          # curl|bash flow on macOS — fail the CI before it ships.
          echo "$OUT" | grep -qE "FAKE_CLI_RAN .* argv=install --yes" \
            || { echo "::error::bootstrap did not forward --yes to the CLI (regression for #199)"; exit 1; }
          test -x "$APPSTRATE_BIN_DIR/appstrate"
          echo "::endgroup::"
          echo "✓ happy path OK"

          # ── Scenario 1b: APPSTRATE_NO_LAUNCH=1 (binary drop, no install) ─
          # Users who want the interactive `appstrate install` flow (once
          # the Bun macOS setRawMode regression is fixed upstream) opt out
          # of the auto-launch via this env var. Assert the binary lands
          # on PATH but the fake CLI is NOT exec'd.
          echo "::group::APPSTRATE_NO_LAUNCH=1"
          set +e
          NOLAUNCH_OUT=$(APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin-nolaunch" \
            APPSTRATE_NO_LAUNCH=1 \
            bash /tmp/bootstrap.sh 2>&1)
          rc=$?
          set -e
          echo "$NOLAUNCH_OUT"
          test "$rc" -eq 0 \
            || { echo "::error::bootstrap exited $rc under APPSTRATE_NO_LAUNCH=1"; exit 1; }
          test -x "$GITHUB_WORKSPACE/bin-nolaunch/appstrate" \
            || { echo "::error::APPSTRATE_NO_LAUNCH=1 did not drop the binary"; exit 1; }
          echo "$NOLAUNCH_OUT" | grep -q "APPSTRATE_NO_LAUNCH=1" \
            || { echo "::error::APPSTRATE_NO_LAUNCH=1 did not emit the skip banner"; exit 1; }
          echo "$NOLAUNCH_OUT" | grep -q "FAKE_CLI_RAN" \
            && { echo "::error::APPSTRATE_NO_LAUNCH=1 still exec'd the CLI"; exit 1; }
          # grep -q exit code 1 means no match — guard asserted.
          echo "::endgroup::"
          echo "✓ APPSTRATE_NO_LAUNCH=1 path OK"

          # ── Scenario 2: tampered binary ───────────────────────────────
          echo "::group::tampered binary"
          cp "$ROOT/release/appstrate-linux-x64" "$ROOT/release/appstrate-linux-x64.bak"
          echo "echo TAMPERED" >> "$ROOT/release/appstrate-linux-x64"
          set +e
          TAMPER_OUT=$(APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin-tampered" \
            bash /tmp/bootstrap.sh 2>&1)
          rc=$?
          set -e
          echo "$TAMPER_OUT"
          if [ "$rc" -eq 0 ]; then
            echo "::error::bootstrap executed a tampered binary"; exit 1
          fi
          echo "$TAMPER_OUT" | grep -qE "SHA-256 mismatch|does NOT match" \
            || { echo "::error::bootstrap did not report the SHA-256 mismatch"; exit 1; }
          # Restore for subsequent scenarios.
          mv "$ROOT/release/appstrate-linux-x64.bak" "$ROOT/release/appstrate-linux-x64"
          echo "::endgroup::"
          echo "✓ tampered-binary path OK"

          # ── Scenario 3: tampered checksums.txt (signature mismatch) ──
          echo "::group::tampered checksums"
          cp "$ROOT/release/checksums.txt" "$ROOT/release/checksums.txt.bak"
          echo "deadbeef  appstrate-linux-x64" > "$ROOT/release/checksums.txt"
          set +e
          SIG_OUT=$(APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin-sig" \
            bash /tmp/bootstrap.sh 2>&1)
          rc=$?
          set -e
          echo "$SIG_OUT"
          if [ "$rc" -eq 0 ]; then
            echo "::error::bootstrap accepted a tampered checksums.txt"; exit 1
          fi
          echo "$SIG_OUT" | grep -qE "Signature verification FAILED|signed by the Appstrate key" \
            || { echo "::error::bootstrap did not report signature failure"; exit 1; }
          mv "$ROOT/release/checksums.txt.bak" "$ROOT/release/checksums.txt"
          echo "::endgroup::"
          echo "✓ tampered-checksums path OK"

          # ── Scenario 4: minisign missing from PATH (fail closed) ─────
          echo "::group::minisign missing"
          # Strip /usr/bin (where minisign lives on Ubuntu) but keep enough
          # for curl + sh builtins + sha256sum (all in /usr/bin, so we also
          # need to shadow minisign by pointing PATH elsewhere and relying
          # on an explicit denylist). Simpler: create a PATH with only the
          # minimum required tools, symlinked explicitly.
          NOBIN="$GITHUB_WORKSPACE/no-minisign-path"
          mkdir -p "$NOBIN"
          for b in curl bash grep sed tr head cat mkdir mktemp rm install chmod cd cp ln sha256sum sudo uname tee printf; do
            if command -v "$b" >/dev/null 2>&1; then
              ln -sf "$(command -v "$b")" "$NOBIN/$b" 2>/dev/null || true
            fi
          done
          set +e
          NOMINI_OUT=$(PATH="$NOBIN" APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin-nomini" \
            bash /tmp/bootstrap.sh 2>&1)
          rc=$?
          set -e
          echo "$NOMINI_OUT"
          if [ "$rc" -eq 0 ]; then
            echo "::error::bootstrap proceeded without minisign available"; exit 1
          fi
          echo "$NOMINI_OUT" | grep -q "minisign is required" \
            || { echo "::error::bootstrap did not emit the minisign-missing hint"; exit 1; }
          echo "::endgroup::"
          echo "✓ missing-minisign path OK"

          # ── Scenario 5: APPSTRATE_SKIP_VERIFY=1 + CI=true (warns + proceeds) ─
          # Skip is gated on CI=true to prevent social-engineered bypass on
          # interactive user shells. CI runs (this one) must opt in explicitly.
          echo "::group::skip-verify bypass"
          APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin-skip" \
          APPSTRATE_SKIP_VERIFY=1 \
          CI=true \
          PATH="$GITHUB_WORKSPACE/bin-skip:$PATH" \
            bash /tmp/bootstrap.sh > /tmp/skip.out 2>&1
          SKIP_OUT=$(cat /tmp/skip.out)
          echo "$SKIP_OUT"
          echo "$SKIP_OUT" | grep -q "APPSTRATE_SKIP_VERIFY=1" \
            || { echo "::error::skip-verify did not emit the warning banner"; exit 1; }
          echo "$SKIP_OUT" | grep -q "FAKE_CLI_RAN" \
            || { echo "::error::skip-verify did not exec the binary"; exit 1; }
          echo "::endgroup::"
          echo "✓ skip-verify path OK"

          # ── Scenario 6: APPSTRATE_SKIP_VERIFY=1 without CI (must fail) ─
          # Defends against the social-engineered copy-paste attack:
          # "just run with APPSTRATE_SKIP_VERIFY=1 to bypass the error".
          echo "::group::skip-verify without CI=true"
          set +e
          # `env -u CI` strips the GitHub-Actions-injected CI=true so we
          # actually exercise the no-CI guard path.
          SKIP_NOCI_OUT=$(env -u CI \
            APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin-skip-noci" \
            APPSTRATE_SKIP_VERIFY=1 \
            PATH="$GITHUB_WORKSPACE/bin-skip-noci:$PATH" \
            bash /tmp/bootstrap.sh 2>&1)
          rc=$?
          set -e
          echo "$SKIP_NOCI_OUT"
          if [ "$rc" -eq 0 ]; then
            echo "::error::bootstrap accepted APPSTRATE_SKIP_VERIFY=1 without CI=true"; exit 1
          fi
          echo "$SKIP_NOCI_OUT" | grep -q "requires CI=true" \
            || { echo "::error::bootstrap did not emit the CI=true guard error"; exit 1; }
          echo "$SKIP_NOCI_OUT" | grep -q "FAKE_CLI_RAN" \
            && { echo "::error::bootstrap exec'd the binary despite refusing skip"; exit 1; }
          # Exit was non-zero AND no exec — guard works as intended.
          echo "::endgroup::"
          echo "✓ skip-verify-no-ci path OK"

          # ── Scenario 7: empty-manifest (signed checksums.txt missing the asset) ─
          # Validly signed manifest, but does NOT list our asset. Without
          # the explicit empty-result check, `sha256sum -c` exits 0 on an
          # empty input file → bypass. Guards the silent-success trap.
          echo "::group::empty manifest"
          cp "$ROOT/release/checksums.txt" "$ROOT/release/checksums.txt.bak"
          cp "$ROOT/release/checksums.txt.minisig" "$ROOT/release/checksums.txt.minisig.bak"
          # Replace with a manifest that contains a different asset line —
          # validly signed by the same key, but our asset is absent.
          echo "deadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeefdeadbeef  appstrate-linux-arm64" \
            > "$ROOT/release/checksums.txt"
          minisign -S -s /tmp/dry.key -t "empty-manifest test" \
            -m "$ROOT/release/checksums.txt"
          set +e
          EMPTY_OUT=$(APPSTRATE_BIN_DIR="$GITHUB_WORKSPACE/bin-empty" \
            bash /tmp/bootstrap.sh 2>&1)
          rc=$?
          set -e
          echo "$EMPTY_OUT"
          if [ "$rc" -eq 0 ]; then
            echo "::error::bootstrap accepted a manifest missing our asset"; exit 1
          fi
          echo "$EMPTY_OUT" | grep -q "not listed in the signed checksums manifest" \
            || { echo "::error::bootstrap did not report the missing-asset error"; exit 1; }
          echo "$EMPTY_OUT" | grep -q "FAKE_CLI_RAN" \
            && { echo "::error::bootstrap exec'd the binary despite missing manifest entry"; exit 1; }
          mv "$ROOT/release/checksums.txt.bak" "$ROOT/release/checksums.txt"
          mv "$ROOT/release/checksums.txt.minisig.bak" "$ROOT/release/checksums.txt.minisig"
          echo "::endgroup::"
          echo "✓ empty-manifest path OK"

          # ── PATH-setup scenarios ────────────────────────────────────────
          # Following scenarios exercise the rootless install + shell-rc
          # modification introduced for issue #186. Trust chain is
          # unchanged; these only assert BIN_DIR defaulting and PATH
          # plumbing. Each runs with an isolated HOME so rc files from
          # one scenario can't leak into the next.
          #
          # PATH-mod only runs when CI is unset (GHA sets CI=true → the
          # installer auto-skips). We strip it with `env -u CI` for the
          # scenarios that must exercise the modification path, and
          # preserve it to assert the auto-skip.
          MARKER="# added by appstrate installer"

          # Helper: run bootstrap in an isolated HOME with a chosen
          # $SHELL and return rc + output. Keeps the per-scenario blocks
          # focused on assertions rather than plumbing.
          run_bootstrap_isolated() {
            _scenario="$1"; shift
            _shell="$1"; shift
            _home="$GITHUB_WORKSPACE/home-${_scenario}"
            rm -rf "$_home"
            mkdir -p "$_home/.local/bin"
            # `env -i` gives us a clean slate — keep only what bootstrap
            # actually needs (PATH for curl/grep/etc.) and the caller's
            # extra vars. This is the only way to reliably strip CI=true
            # from GHA's injected environment in a child process.
            env -i \
              HOME="$_home" \
              SHELL="$_shell" \
              PATH="/usr/local/bin:/usr/bin:/bin" \
              "$@" \
              bash /tmp/bootstrap.sh 2>&1
          }

          # ── Scenario 8: rootless default + zsh rc modification ──────
          echo "::group::rootless default (zsh)"
          OUT8=$(run_bootstrap_isolated 8 "/bin/zsh") || {
            echo "$OUT8"; echo "::error::bootstrap failed on rootless zsh path"; exit 1
          }
          echo "$OUT8"
          H8="$GITHUB_WORKSPACE/home-8"
          test -x "$H8/.local/bin/appstrate" \
            || { echo "::error::binary not installed to rootless default"; exit 1; }
          test -f "$H8/.zshrc" \
            || { echo "::error::.zshrc was not created"; exit 1; }
          grep -qF "$MARKER" "$H8/.zshrc" \
            || { echo "::error::.zshrc missing install marker"; exit 1; }
          grep -q "export PATH=\"$H8/.local/bin:\$PATH\"" "$H8/.zshrc" \
            || { echo "::error::.zshrc missing PATH export"; exit 1; }
          # .zprofile covers login shells — macOS default for zsh is a login
          # shell, so missing this would leave PATH broken in Terminal.app
          # until the first interactive sub-shell.
          test -f "$H8/.zprofile" \
            || { echo "::error::.zprofile was not created (login-shell coverage)"; exit 1; }
          grep -qF "$MARKER" "$H8/.zprofile" \
            || { echo "::error::.zprofile missing install marker"; exit 1; }
          # The hint output must list every touched file, not just the last
          # one — regression guard for the MODIFIED_PROFILE-overwritten bug.
          echo "$OUT8" | grep -qF ".zshrc" \
            || { echo "::error::hint output missing .zshrc"; exit 1; }
          echo "$OUT8" | grep -qF ".zprofile" \
            || { echo "::error::hint output missing .zprofile"; exit 1; }
          echo "::endgroup::"
          echo "✓ rootless-zsh OK"

          # ── Scenario 9: idempotent re-run (no duplicate lines) ─────
          echo "::group::idempotent re-run"
          # Re-use the scenario-8 HOME so the marker is already present.
          BEFORE=$(wc -l <"$H8/.zshrc")
          env -i \
            HOME="$H8" \
            SHELL="/bin/zsh" \
            PATH="/usr/local/bin:/usr/bin:/bin" \
            bash /tmp/bootstrap.sh >/dev/null 2>&1 || {
            echo "::error::second bootstrap run failed"; exit 1
          }
          AFTER=$(wc -l <"$H8/.zshrc")
          test "$BEFORE" -eq "$AFTER" \
            || { echo "::error::.zshrc grew on re-run ($BEFORE → $AFTER lines)"; exit 1; }
          # And only one marker, not two.
          COUNT=$(grep -cF "$MARKER" "$H8/.zshrc")
          test "$COUNT" -eq 1 \
            || { echo "::error::marker appeared $COUNT times, expected 1"; exit 1; }
          echo "::endgroup::"
          echo "✓ idempotent path OK"

          # ── Scenario 10: bash shotgun ──────────────────────────────
          echo "::group::bash shotgun"
          OUT10=$(run_bootstrap_isolated 10 "/bin/bash") || {
            echo "$OUT10"; echo "::error::bootstrap failed on bash shotgun path"; exit 1
          }
          H10="$GITHUB_WORKSPACE/home-10"
          for f in .profile .bashrc .bash_profile; do
            test -f "$H10/$f" \
              || { echo "::error::bash shotgun did not write $f"; exit 1; }
            grep -qF "$MARKER" "$H10/$f" \
              || { echo "::error::$f missing install marker"; exit 1; }
          done
          echo "::endgroup::"
          echo "✓ bash-shotgun OK"

          # ── Scenario 11: fish conf.d ───────────────────────────────
          echo "::group::fish conf.d"
          OUT11=$(run_bootstrap_isolated 11 "/usr/bin/fish") || {
            echo "$OUT11"; echo "::error::bootstrap failed on fish path"; exit 1
          }
          H11="$GITHUB_WORKSPACE/home-11"
          FISH_CONF="$H11/.config/fish/conf.d/appstrate.fish"
          test -f "$FISH_CONF" \
            || { echo "::error::fish conf.d file was not created"; exit 1; }
          grep -q "fish_add_path $H11/.local/bin" "$FISH_CONF" \
            || { echo "::error::fish config missing fish_add_path line"; exit 1; }
          # No bash/zsh artifacts should exist for fish users.
          test ! -f "$H11/.zshrc" \
            || { echo "::error::fish scenario wrote .zshrc"; exit 1; }
          echo "::endgroup::"
          echo "✓ fish path OK"

          # ── Scenario 12: APPSTRATE_NO_MODIFY_PATH=1 opt-out ────────
          echo "::group::no-modify-path opt-out"
          OUT12=$(run_bootstrap_isolated 12 "/bin/zsh" \
            APPSTRATE_NO_MODIFY_PATH=1) || {
            echo "$OUT12"; echo "::error::bootstrap failed with NO_MODIFY_PATH"; exit 1
          }
          H12="$GITHUB_WORKSPACE/home-12"
          test -x "$H12/.local/bin/appstrate" \
            || { echo "::error::binary not installed with NO_MODIFY_PATH"; exit 1; }
          test ! -f "$H12/.zshrc" \
            || { echo "::error::.zshrc was written despite NO_MODIFY_PATH=1"; exit 1; }
          echo "::endgroup::"
          echo "✓ no-modify-path opt-out OK"

          # ── Scenario 13: CI=<truthy> auto-skips PATH modification ───
          # Iterate over the accepted truthy values (true / 1 / yes) — not
          # every CI exports CI=true verbatim (some use 1), so all three
          # must short-circuit the rc modification path.
          for _ci_val in true 1 yes; do
            echo "::group::CI=${_ci_val} auto-skip"
            H13="$GITHUB_WORKSPACE/home-13-${_ci_val}"
            rm -rf "$H13"; mkdir -p "$H13/.local/bin"
            env -i \
              HOME="$H13" \
              SHELL="/bin/zsh" \
              CI="$_ci_val" \
              PATH="/usr/local/bin:/usr/bin:/bin" \
              bash /tmp/bootstrap.sh >/dev/null 2>&1 || {
              echo "::error::bootstrap failed with CI=${_ci_val}"; exit 1
            }
            test ! -f "$H13/.zshrc" \
              || { echo "::error::CI=${_ci_val} did not auto-skip PATH modification"; exit 1; }
            test ! -f "$H13/.zprofile" \
              || { echo "::error::CI=${_ci_val} did not auto-skip .zprofile"; exit 1; }
            echo "::endgroup::"
            echo "✓ CI=${_ci_val} auto-skip OK"
          done

          # ── Scenario 14: BIN_DIR already in PATH → skip rc ──────────
          echo "::group::BIN_DIR already on PATH"
          H14="$GITHUB_WORKSPACE/home-14"
          rm -rf "$H14"; mkdir -p "$H14/.local/bin"
          env -i \
            HOME="$H14" \
            SHELL="/bin/zsh" \
            PATH="$H14/.local/bin:/usr/local/bin:/usr/bin:/bin" \
            bash /tmp/bootstrap.sh >/dev/null 2>&1 || {
            echo "::error::bootstrap failed with BIN_DIR pre-on-PATH"; exit 1
          }
          test ! -f "$H14/.zshrc" \
            || { echo "::error::rc modified despite BIN_DIR already on PATH"; exit 1; }
          echo "::endgroup::"
          echo "✓ already-on-PATH skip OK"
