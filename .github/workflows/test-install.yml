name: Test Installer

on:
  pull_request:
    paths:
      - "scripts/install.sh"
      - "test/install/**"
      - "examples/self-hosting/**"
      - ".github/workflows/test-install.yml"
  push:
    branches: [main]
    paths:
      - "scripts/install.sh"
      - "test/install/**"
      - ".github/workflows/test-install.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: shellcheck
        uses: ludeeus/action-shellcheck@00b27aa7cb85167568cb48a3838b75f4265f2bca # 2.0.0
        with:
          scandir: ./scripts
          severity: warning

      - name: shfmt (format check)
        run: |
          curl -fsSL -o /tmp/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          chmod +x /tmp/shfmt
          /tmp/shfmt -d -i 2 -ci scripts/install.sh

  unit-bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run BATS unit tests
        run: |
          docker run --rm -v "$PWD:/code" -w /code --entrypoint sh \
            bats/bats:1.11.0 -c '
              apk add --no-cache openssl >/dev/null
              bats test/install/install.bats
            '

  smoke-dind:
    runs-on: ubuntu-latest
    needs: [static, unit-bats]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Render install.sh
        run: |
          sed "s|__APPSTRATE_VERSION__|latest|g" \
            scripts/install.sh > /tmp/install.sh
          chmod +x /tmp/install.sh

      # Validates the full installer flow in a clean Linux DinD container:
      # prereq detection, env generation, secret uniqueness, compose config
      # validity. Does NOT start services (GHCR images unavailable pre-release).
      # Full stack E2E is covered by scripts/test-install-local.sh.
      - name: Validate installer in DinD (Linux)
        run: |
          docker run --rm --privileged \
            -v /tmp/install.sh:/install.sh:ro \
            -v "${{ github.workspace }}/examples/self-hosting:/assets:ro" \
            -e APPSTRATE_PORT=3000 \
            -e APPSTRATE_ASSETS_DIR=/assets \
            -e DOCKER_TLS_CERTDIR= \
            docker:27-dind sh -c '
              set -e
              export DOCKER_HOST=unix:///var/run/docker.sock

              dockerd-entrypoint.sh > /var/log/dockerd.log 2>&1 &
              echo "Waiting for inner dockerd..."
              for i in $(seq 1 60); do
                docker info >/dev/null 2>&1 && break
                sleep 1
              done
              docker info >/dev/null || { tail -50 /var/log/dockerd.log; exit 1; }
              apk add --no-cache bash curl openssl lsof >/dev/null

              echo "── 1. Prereq detection ──"
              # Source the script to test functions without running do_install
              export APPSTRATE_DIR=/root/.appstrate
              export APPSTRATE_QUIET=1
              export NO_COLOR=1
              set +e
              . /install.sh
              set +e
              trap - ERR

              detect_environment
              echo "✓ prereqs detected"

              echo "── 2. Workdir + env generation ──"
              prepare_workdir
              determine_install_mode
              [ "$INSTALL_MODE" = "fresh" ] || { echo "✗ expected fresh, got $INSTALL_MODE"; exit 1; }
              download_assets
              handle_env_file
              echo "✓ env generated"

              echo "── 3. Validate generated .env ──"
              for key in POSTGRES_PASSWORD BETTER_AUTH_SECRET RUN_TOKEN_SECRET \
                         CONNECTION_ENCRYPTION_KEY MINIO_ROOT_PASSWORD UPLOAD_SIGNING_SECRET \
                         APP_URL PORT DOCKER_GID APPSTRATE_VERSION; do
                grep -q "^${key}=" /root/.appstrate/.env || { echo "✗ missing $key"; exit 1; }
              done
              # Secrets must not be CHANGE_ME
              for key in POSTGRES_PASSWORD BETTER_AUTH_SECRET MINIO_ROOT_PASSWORD; do
                val=$(grep "^${key}=" /root/.appstrate/.env | cut -d= -f2)
                [ "$val" != "CHANGE_ME" ] || { echo "✗ $key still CHANGE_ME"; exit 1; }
              done
              # Permissions
              perms=$(stat -c "%a" /root/.appstrate/.env)
              [ "$perms" = "600" ] || { echo "✗ .env perms: $perms (expected 600)"; exit 1; }
              echo "✓ all secrets generated, correct perms"

              echo "── 4. Compose config validation ──"
              docker compose -f /root/.appstrate/docker-compose.yml \
                --env-file /root/.appstrate/.env config --quiet
              echo "✓ compose config valid"

              echo "── 5. Noop detection ──"
              echo "latest" > /root/.appstrate/.version
              determine_install_mode
              [ "$INSTALL_MODE" = "noop" ] || { echo "✗ expected noop, got $INSTALL_MODE"; exit 1; }
              echo "✓ noop mode detected"

              echo "── 6. Upgrade detection ──"
              echo "v0.1.0" > /root/.appstrate/.version
              APPSTRATE_VERSION=latest
              determine_install_mode
              [ "$INSTALL_MODE" = "upgrade" ] || { echo "✗ expected upgrade, got $INSTALL_MODE"; exit 1; }
              echo "✓ upgrade mode detected"

              echo "── 7. Docker GID probe ──"
              gid=$(detect_docker_gid)
              [ -n "$gid" ] || { echo "✗ empty GID"; exit 1; }
              echo "✓ Docker socket GID: $gid"

              echo "── All checks passed ──"
            '
