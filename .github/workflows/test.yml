name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Unit tests need PostgreSQL + Redis because bunfig.toml preload starts
      # docker-compose unconditionally. Services start fast with tmpfs + fsync=off.
      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run unit tests
        run: bun test apps/api/test/unit/ runtime-pi/ packages/connect/

  integration:
    name: Integration tests
    if: contains(github.event.pull_request.labels.*.name, 'integration')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run all tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          files: coverage/report.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E tests
    if: contains(github.event.pull_request.labels.*.name, 'e2e') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: cd apps/web && bun run build

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Prepare data directory for PGlite
        run: mkdir -p data/pglite data/storage

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          BETTER_AUTH_SECRET: e2e-ci-secret-that-is-at-least-32-characters
          CONNECTION_ENCRYPTION_KEY: Y2FzgQmlgIRocYT1VUWM+73fQ5zOTPB8sHJxTh1x4qI=
          # E2E suite seeds webhooks (cascade deletion, cross-app/org isolation,
          # UI org switching). The webhooks module is opt-in via MODULES
          # since PR #72 — without this the webhook routes 404 and 12 specs fail.
          MODULES: webhooks

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
