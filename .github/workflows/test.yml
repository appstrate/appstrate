name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Unit tests need PostgreSQL + Redis because bunfig.toml preload starts
      # docker-compose unconditionally. Services start fast with tmpfs + fsync=off.
      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run unit tests
        run: bun test apps/api/test/unit/ runtime-pi/ packages/connect/

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run all tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v5.4.3
        with:
          files: coverage/report.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
