name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Unit tests need PostgreSQL + Redis because bunfig.toml preload starts
      # docker-compose unconditionally. Services start fast with tmpfs + fsync=off.
      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      # Path list covers every package whose tests are pure unit (no service deps
      # beyond the Docker stack the preload boots). Integration tests for
      # apps/api/test/integration/ and apps/api/src/modules/oidc/test/integration/
      # remain in the heavier `integration` job below — they need DB seeding and
      # are slower to run, so they stay opt-in via the `integration` label or
      # post-merge on main. Anything pure-unit must run on every PR.
      - name: Run unit tests
        run: |
          bun test \
            apps/api/test/unit/ \
            apps/api/src/modules/oidc/test/unit/ \
            apps/api/src/modules/webhooks/test/unit/ \
            apps/web/src/ \
            runtime-pi/ \
            packages/connect/ \
            packages/core/ \
            packages/afps-runtime/ \
            packages/mcp-transport/ \
            packages/runner-pi/ \
            packages/emails/ \
            packages/env/ \
            packages/ui/

      # CLI tests live in a separate workspace with its own bunfig.toml
      # (no Docker preload needed), so we run them from that directory to
      # pick up the right config and keep them fast.
      - name: Run CLI unit tests
        working-directory: apps/cli
        run: bun test

  integration:
    name: Integration tests
    # Run on every push to main (post-merge gate) + on PRs labeled
    # `integration` (opt-in pre-merge). Without the main-branch arm,
    # code could land on main via a never-labeled PR and reach production
    # without the integration suite ever having been exercised in CI —
    # the e2e job below is label-OR-main for the same reason, keeping
    # both jobs aligned on post-merge validation.
    if: contains(github.event.pull_request.labels.*.name, 'integration') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run all tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage/report.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E tests
    if: contains(github.event.pull_request.labels.*.name, 'e2e') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: cd apps/web && bun run build

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Prepare data directory for PGlite
        run: mkdir -p data/pglite data/storage

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          BETTER_AUTH_SECRET: e2e-ci-secret-that-is-at-least-32-characters
          CONNECTION_ENCRYPTION_KEY: Y2FzgQmlgIRocYT1VUWM+73fQ5zOTPB8sHJxTh1x4qI=
          UPLOAD_SIGNING_SECRET: e2e-ci-upload-signing-secret
          # E2E suite seeds webhooks (cascade deletion, cross-app/org isolation,
          # UI org switching). The webhooks module is opt-in via MODULES
          # since PR #72 — without this the webhook routes 404 and 12 specs fail.
          MODULES: webhooks
          # Default system model so run-acceptance passes in specs that POST
          # /agents/:id/run (e.g. upload-flow). The run pipeline only needs a
          # resolvable model at acceptance time — the dummy apiKey is never
          # called because RUN_ADAPTER=process doesn't actually hit the LLM.
          SYSTEM_PROVIDER_KEYS: '[{"id":"e2e","label":"E2E","api":"anthropic-messages","baseUrl":"https://example.invalid","apiKey":"e2e-dummy","models":[{"modelId":"claude-sonnet-4-5","label":"E2E Default","isDefault":true}]}]'

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
