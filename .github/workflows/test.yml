name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6a0e0c2e60c4c57a3f11708f9e0 # v2.0.2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Unit tests need PostgreSQL + Redis because bunfig.toml preload starts
      # docker-compose unconditionally. Services start fast with tmpfs + fsync=off.
      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run unit tests
        run: bun test apps/api/test/unit/ runtime-pi/ packages/connect/

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@735343b667d3e6a0e0c2e60c4c57a3f11708f9e0 # v2.0.2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run all tests with coverage
        run: bun test --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
