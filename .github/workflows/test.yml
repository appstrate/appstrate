name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Install dependencies
        run: bun install

      # Unit tests need PostgreSQL + Redis because bunfig.toml preload starts
      # docker-compose unconditionally. Services start fast with tmpfs + fsync=off.
      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      # Path list covers every package whose tests are pure unit (no service deps
      # beyond the Docker stack the preload boots). Integration tests for
      # apps/api/test/integration/ and apps/api/src/modules/oidc/test/integration/
      # remain in the heavier `integration` job below — they need DB seeding and
      # are slower to run, so they stay opt-in via the `integration` label or
      # post-merge on main. Anything pure-unit must run on every PR.
      # --coverage on the always-on unit job is what gives every PR a coverage
      # signal (Codecov patch coverage + the `unit` flag) without paying for the
      # heavier `integration` job below. The full project total is reconstructed
      # on Codecov by carrying the `integration` flag forward from the PR base
      # (see flags.*.carryforward in .codecov.yml).
      - name: Run unit tests
        run: |
          bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage \
            apps/api/test/unit/ \
            apps/api/src/modules/firecracker/test/unit/ \
            apps/api/src/modules/mcp/test/unit/ \
            apps/api/src/modules/oidc/test/unit/ \
            apps/api/src/modules/webhooks/test/unit/ \
            apps/web/src/ \
            packages/module-chat/ \
            runtime-pi/ \
            packages/connect/ \
            packages/core/ \
            packages/afps-runtime/ \
            packages/mcp-transport/ \
            packages/runner-pi/ \
            packages/emails/ \
            packages/env/ \
            packages/ui/

      # Surface the figure in the job summary so humans see it without opening
      # Codecov. Sums LF/LH across the lcov report; informational only (the gate
      # is Codecov). Flagged as partial because it omits the integration suite.
      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            pct=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END{ if (lf>0) printf "%.2f", (lh/lf)*100; else printf "0.00" }' coverage/lcov.info)
            files=$(grep -c '^SF:' coverage/lcov.info || echo 0)
            {
              echo "## Coverage (unit job)"
              echo ""
              echo "Line coverage: **${pct}%** across ${files} instrumented files."
              echo ""
              echo "_Partial — unit job only. Full project coverage (unit + integration) is reconciled on Codecov; the project gate runs there._"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      # Fork-PR note: external contributors' PRs run with no access to repo
      # secrets, so `secrets.CODECOV_TOKEN` is empty. codecov-action v6 then
      # attempts a tokenless upload (supported for public repos); if that fails,
      # `fail_ci_if_error: false` keeps this step — and the CI job — green. The
      # Codecov `project` status is `informational: true` (.codecov.yml), so it
      # never blocks a fork PR that could not upload. Same-repo PRs use the
      # token and upload normally.
      - name: Upload unit coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      # CLI tests live in a separate workspace with its own bunfig.toml
      # (no Docker preload needed), so we run them from that directory to
      # pick up the right config and keep them fast.
      - name: Run CLI unit tests
        working-directory: apps/cli
        run: bun test

  integration:
    name: Integration tests
    # Run on every push to main (post-merge gate) + on PRs labeled
    # `integration` (opt-in pre-merge). Without the main-branch arm,
    # code could land on main via a never-labeled PR and reach production
    # without the integration suite ever having been exercised in CI —
    # the e2e job below is label-OR-main for the same reason, keeping
    # both jobs aligned on post-merge validation.
    if: contains(github.event.pull_request.labels.*.name, 'integration') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Install dependencies
        run: bun install

      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run all tests with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-dir=coverage

      - name: Upload integration coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # Bun's lcov reporter writes coverage/lcov.info (the previous
          # report.lcov path never existed, so this upload was silently a no-op
          # under fail_ci_if_error: false).
          files: coverage/lcov.info
          flags: integration
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  runtime-e2e:
    name: Runtime container e2e
    # The runtime-pi document-provisioning spin only reproduces in the BUNDLED
    # image, so `runtime-pi/test/provision-container.e2e.test.ts` needs the real
    # `appstrate-pi` image built — which the fast `unit` job does not do (it
    # would blow the 5-min budget), so that test SKIPS there. This job builds
    # the image and runs it, giving the regression an actual gate. Same
    # label-OR-main policy as the other heavy jobs (opt-in pre-merge via the
    # `e2e` label, always post-merge on main).
    if: contains(github.event.pull_request.labels.*.name, 'e2e') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Install dependencies
        run: bun install

      # Build the agent runtime image the e2e launches, on the runner's native
      # platform — the test gates on the image matching the engine's platform
      # (#882). Tag `appstrate-pi:latest` — the test's default `PI_IMAGE`.
      - name: Build appstrate-pi image
        run: docker build -t appstrate-pi:latest -f runtime-pi/Dockerfile .

      # The root bunfig preload boots the test docker-compose stack
      # unconditionally; start it so the preload is satisfied (the e2e itself
      # uses only its own in-process mock sink, not the DB).
      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run runtime container e2e
        run: bun test runtime-pi/test/provision-container.e2e.test.ts

  e2e:
    name: E2E tests
    if: contains(github.event.pull_request.labels.*.name, 'e2e') || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: cd apps/web && bun run build

      - name: Install Playwright browsers
        run: cd e2e && npx playwright install chromium --with-deps

      - name: Prepare data directory for PGlite
        run: mkdir -p data/pglite data/storage

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          BETTER_AUTH_SECRET: e2e-ci-secret-that-is-at-least-32-characters
          CONNECTION_ENCRYPTION_KEY: Y2FzgQmlgIRocYT1VUWM+73fQ5zOTPB8sHJxTh1x4qI=
          UPLOAD_SIGNING_SECRET: e2e-ci-upload-signing-secret
          CONNECT_SESSION_SECRET: e2e-ci-connect-session-secret
          # E2E suite needs the full default module set:
          #  - webhooks: cascade deletion, cross-app/org isolation, UI org switching
          #    (opt-in since PR #72; without it webhook routes 404 and 12 specs fail)
          #  - core-providers: registers the anthropic/openai/openai-compatible
          #    api-key model providers. SYSTEM_PROVIDER_KEYS rows are only
          #    accepted at run time if their api shape resolves against the
          #    registry, so without this module upload-flow.api 400s on every
          #    POST /agents/:scope/:name/run.
          #  - @appstrate/module-codex: registers `codex` so the pairing-lifecycle
          #    e2e (`providerId: "codex"`) passes `isOAuthModelProvider()` and
          #    mint returns 200 instead of 400.
          #  - @appstrate/module-claude-code: registers `claude-code` so the
          #    parallel pairing-lifecycle e2e (`providerId: "claude-code"`)
          #    passes the same checks for the Anthropic OAuth surface.
          # oidc is kept in lockstep with .env.example / packages/env defaults so
          # the suite stays representative of a default self-host install.
          MODULES: oidc,webhooks,mcp,core-providers,@appstrate/module-codex,@appstrate/module-claude-code
          # Default system model so run-acceptance passes in specs that POST
          # /agents/:id/run (e.g. upload-flow). The run pipeline only needs a
          # resolvable model at acceptance time — the dummy apiKey is never
          # called because RUN_ADAPTER=process doesn't actually hit the LLM.
          SYSTEM_PROVIDER_KEYS: '[{"id":"e2e","label":"E2E","providerId":"anthropic","apiKey":"e2e-dummy","models":[{"modelId":"claude-sonnet-4-5","label":"E2E Default","isDefault":true}]}]'

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
