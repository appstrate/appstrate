name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Unit tests need PostgreSQL + Redis because bunfig.toml preload starts
      # docker-compose unconditionally. Services start fast with tmpfs + fsync=off.
      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run unit tests
        run: bun test apps/api/test/unit/ runtime-pi/ packages/connect/

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test infrastructure
        run: docker compose -f test/setup/docker-compose.test.yml up -d --wait

      - name: Run all tests
        run: bun test
