name: Publish @appstrate/afps-shared to npm

# RELEASE ORDER: @appstrate/afps-shared is a leaf dependency of @appstrate/core
# (and afps-runtime) via a `^` range. Publish a new afps-shared version to npm
# BEFORE tagging any core/afps-runtime release that bumps its `^` dependency,
# or `npm install @appstrate/core` will fail to resolve the range.

on:
  push:
    tags:
      - "afps-shared@*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

# Serialize ALL afps-shared publishes — npm `latest` dist-tag race on
# rapid-fire tag pushes (same rationale as publish-core.yml).
concurrency:
  group: publish-afps-shared
  cancel-in-progress: false

jobs:
  publish:
    name: Quality, Tests & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/afps-shared

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install
        working-directory: .

      - name: TypeScript type-check
        run: tsc --noEmit

      - name: Tests
        run: bun test

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#afps-shared@}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
