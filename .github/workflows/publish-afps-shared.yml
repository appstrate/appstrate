name: Publish @appstrate/afps-shared to npm

# RELEASE ORDER: @appstrate/afps-shared is a leaf dependency of @appstrate/core
# (and afps-runtime) via a `^` range. Publish a new afps-shared version to npm
# BEFORE tagging any core/afps-runtime release that bumps its `^` dependency,
# or `npm install @appstrate/core` will fail to resolve the range.

on:
  push:
    tags:
      - "afps-shared@*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

# Serialize ALL afps-shared publishes — npm `latest` dist-tag race on
# rapid-fire tag pushes (same rationale as publish-core.yml).
concurrency:
  group: publish-afps-shared
  cancel-in-progress: false

jobs:
  publish:
    name: Quality, Tests & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/afps-shared

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: TypeScript type-check
        run: tsc --noEmit

      - name: Tests
        run: bun test

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#afps-shared@}"
          PKG_VERSION=$(jq -r .version package.json)
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          generate_release_notes: true
