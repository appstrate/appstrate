name: Refresh pricing catalog

on:
  schedule:
    # Weekly — Mondays 06:00 UTC. Far enough from typical release activity
    # that a drift PR doesn't collide with on-call deploys.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Refresh catalog (apply)
        run: bun scripts/refresh-pricing-catalog.ts --apply

      # rationale: see .github/actions/bun-setup/action.yml
      - name: Install dependencies
        run: bun install

      - name: Format generated files
        # The generator writes JSON that does not match Prettier style;
        # without this the drift PR breaks the Check workflow's format:check.
        run: bunx prettier --write "apps/api/src/data/**"

      - name: Check for drift
        id: drift
        run: |
          if git diff --quiet apps/api/src/data/pricing; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes — nothing to commit."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            git diff --stat apps/api/src/data/pricing
          fi

      - name: Open PR
        if: steps.drift.outputs.drift == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: chore/refresh-pricing-catalog
          delete-branch: true
          base: main
          commit-message: |
            chore(pricing): refresh LiteLLM pricing catalog

            Weekly refresh of `apps/api/src/data/pricing/*.json` from
            BerriAI/litellm (MIT).
          title: "chore(pricing): refresh LiteLLM pricing catalog"
          body: |
            Automated weekly refresh of the vendored LiteLLM pricing
            catalog. Upstream source:
            https://github.com/BerriAI/litellm/blob/main/litellm/model_prices_and_context_window_backup.json

            Diff scope is `apps/api/src/data/pricing/*.json`.
            Cost lookup in `apps/api/src/services/pricing-catalog.ts` reads
            these files at module-load time — merging this PR redeploys with
            the new prices on the next release.

            Reviewer checklist:
            - Spot-check 1-2 model price changes against
              https://openai.com/api/pricing / https://www.anthropic.com/pricing.
            - Confirm no models we rely on were removed (search `model:`
              in `apps/api/src/services/llm-proxy/` if unsure).
          labels: |
            pricing
            automated
