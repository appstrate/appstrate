name: System-package conformance monitor

on:
  schedule:
    # Weekly — Mondays 06:00 UTC. Remote servers are upstream-controlled; this
    # catches MCP tool-catalog drift + credential-only auth-liveness (--tier
    # all) out of band from the merge gate, which only runs the deterministic
    # local checks.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup Bun
        uses: ./.github/actions/bun-setup

      - name: Install dependencies
        run: bun install

      - name: Run conformance (all tier)
        id: run
        env:
          # Opt-in credentials: JSON map of package id → bearer access token,
          # e.g. {"@appstrate/stripe":"sk_test_..."}. Absent → auth-gated
          # servers report a "skipped" WARN instead of being tested.
          CONFORMANCE_TOKENS: ${{ secrets.CONFORMANCE_TOKENS }}
        run: |
          set +e
          {
            echo "## System-package conformance — \`--tier all\`"
            echo
            echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo '```'
          } > conformance-report.md
          # Pipeline must stay in THIS shell so PIPESTATUS reflects the run's
          # exit code (a `{ … } | tee` brace-group would capture it in a
          # subshell and lose it — opening the issue on every run).
          bun run test:system-packages --tier all --snapshot-out conformance-snapshot 2>&1 | tee -a conformance-report.md
          code=${PIPESTATUS[0]}
          echo '```' >> conformance-report.md
          echo "code=${code}" >> "$GITHUB_OUTPUT"

      - name: Upload live tool-surface snapshot
        # Full name+description+inputSchema per remote MCP server, fetched fresh
        # this run. Diff against an earlier run's artifact to inspect upstream
        # drift — there is no committed baseline.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: conformance-tool-snapshot
          path: conformance-snapshot/
          if-no-files-found: ignore

      - name: Open or update tracking issue
        # Only `fail` findings (real parity drift / SSRF) flip the exit code.
        # "couldn't test" WARNs (no credential, upstream down) do not, so a
        # credential-less monitor stays quiet until a genuine mismatch lands.
        if: steps.run.outputs.code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create conformance \
            --color B60205 \
            --description "System-package conformance monitor" 2>/dev/null || true
          title="System-package conformance drift detected"
          existing=$(gh issue list --state open --label conformance --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file conformance-report.md
          else
            gh issue create --title "$title" --label conformance --body-file conformance-report.md
          fi
