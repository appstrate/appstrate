name: Stale

on:
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Close stale issues and PRs
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: "pinned,security,roadmap,work-in-progress"
          exempt-pr-labels: "pinned,security,roadmap,work-in-progress"
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity for 60 days. It will be closed in 14 days if no
            further activity occurs. If this issue is still relevant, please leave
            a comment or remove the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had recent activity for 60 days. It will be closed in 14 days if no
            further activity occurs. If this PR is still relevant, please leave a
            comment or remove the stale label.
