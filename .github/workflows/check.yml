name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      # Lockfile integrity guard. We can't use `bun install --frozen-lockfile`:
      # its comparator has a bug with @openai/codex's same-name aliased platform
      # binaries (@openai/codex@0.141.0-<platform>) and false-reports "lockfile
      # had changes" on a byte-stable lockfile. A non-frozen `bun install`
      # resolves correctly from the committed lockfile; this diff catches any
      # PR that legitimately drifts it.
      - name: Verify lockfile is up to date
        run: git diff --exit-code bun.lock

      # Ban over-claiming ToS language. Subscription use is an operator opt-in
      # grey-zone, not a certification — source/docs must use the
      # SUBSCRIPTION_COMPLIANCE.md framing, never assert "ToS-clean" / "SANCTIONED".
      - name: Guard against over-claiming ToS language
        run: |
          if git grep -nE 'ToS-clean|SANCTIONED'; then
            echo "::error::Forbidden over-claiming ToS language (ToS-clean / SANCTIONED). Use the SUBSCRIPTION_COMPLIANCE.md framing instead."
            exit 1
          fi

      - name: Run checks
        run: bun run check
        env:
          BETTER_AUTH_SECRET: ci-dummy-secret
          CONNECTION_ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          UPLOAD_SIGNING_SECRET: ci-dummy-upload-signing-secret
