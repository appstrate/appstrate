name: Setup Bun
description: >
  Install the pinned Bun toolchain. Single source of truth for the Bun version
  and the @openai/codex frozen-lockfile workaround — bump or revert here, not in
  every workflow.

  Note on `bun install`: callers run a plain `bun install` (never
  `--frozen-lockfile`). A comparator bug with @openai/codex's same-name aliased
  platform binaries (@openai/codex@0.141.0-<platform>) makes `--frozen-lockfile`
  report "lockfile had changes" on a byte-stable lockfile. A non-frozen
  `bun install` is a no-op on a correct lockfile, so `git diff --exit-code
  bun.lock` (run once, in the Check workflow) is the equivalent integrity gate.

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        # Bun pinned to 1.3.14 for the @openai/codex aliased-binary
        # frozen-lockfile bug; revert this single line when Bun fixes it.
        bun-version: "1.3.14"
